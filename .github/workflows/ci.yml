name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint · typecheck · test · build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      # ---- frontend gate ----
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Build frontend
        run: npm run build # also produces dist/ that the Rust build embeds

      # ---- Rust gate ----
      # Note: `cargo fmt --check` is intentionally NOT run here. rustfmt ignores `#[cfg]`,
      # so it follows the cfg-gated `mod pro` into `src/pro/`, whose source is intentionally
      # absent from this public repo — making the check impossible. Rust formatting is
      # enforced upstream in eko-pro (where `src/pro/` exists). clippy below respects
      # `#[cfg]` and works fine.
      - name: Rust clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri
      - name: Rust tests
        run: cargo test
        working-directory: src-tauri

  # Note: the docs/marketing site (`site/`) is plain static HTML — no build step, so no CI
  # job. It deploys as-is to any static host.
