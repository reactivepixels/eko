# EKO Release Workflow
#
# Triggers on any tag matching v* (e.g. v0.1.0, v1.0.0).
#
# Two paths, chosen automatically:
#   • If the Apple signing secrets are present  → signed + NOTARIZED DMG.
#   • If they're absent                         → ad-hoc (unsigned) DMG that
#     still runs after a right-click → Open (or stripping the quarantine flag).
# This keeps the release GREEN with or without a paid Apple Developer ID.
#
# To enable signing + notarization, set these in Settings → Secrets → Actions:
#
#   APPLE_CERTIFICATE            Base64-encoded "Developer ID Application" .p12
#                                (export from Keychain, then: base64 -i cert.p12 | pbcopy)
#   APPLE_CERTIFICATE_PASSWORD   Password you set when exporting the .p12
#   APPLE_SIGNING_IDENTITY       The cert's Common Name, e.g.
#                                "Developer ID Application: Reactive Pixels (XXXXXXXXXX)"
#   APPLE_ID                     Apple ID email used for notarization
#   APPLE_PASSWORD               App-specific password for that Apple ID
#                                (generate at appleid.apple.com → Sign-in and Security)
#   APPLE_TEAM_ID                10-character team ID (developer.apple.com → Membership)
#   TAURI_SIGNING_PRIVATE_KEY    (optional) updater key from `npm run tauri signer generate`
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  (optional) password for that key
#   GITHUB_TOKEN                 Automatically provided by GitHub Actions — no setup needed.

name: Release

on:
  push:
    tags:
      - "v*"

# Only one release per tag at a time.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-macos:
    name: Build · Release (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node ────────────────────────────────────────────────────────────────
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ── Rust ────────────────────────────────────────────────────────────────
      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node dependencies
        run: npm ci

      # ── Pick the build path based on whether a signing cert is configured ────
      # IMPORTANT: when there is no cert, we must NOT pass the APPLE_* env at all —
      # Tauri otherwise tries to `security import` an empty certificate and the
      # bundle step dies with "failed to import keychain certificate".
      - name: Detect Apple signing
        id: signing
        run: |
          if [ -n "${{ secrets.APPLE_CERTIFICATE }}" ]; then
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No APPLE_CERTIFICATE secret set — building an ad-hoc (unsigned) DMG."
          fi

      # ── Signed + notarized build (secrets present) ──────────────────────────
      - name: Build · sign · notarize · release
        if: steps.signing.outputs.signed == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "EKO ${{ github.ref_name }}"
          releaseBody: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for what's new in this release.
          releaseDraft: true
          prerelease: false

      # ── Ad-hoc build (no secrets) — note: NO APPLE_* env here on purpose ─────
      - name: Build · release (ad-hoc, unsigned)
        if: steps.signing.outputs.signed == 'false'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "EKO ${{ github.ref_name }}"
          releaseBody: |
            **Unsigned build.** macOS will block it on first launch ("damaged" / "unidentified developer") because it isn't Apple-notarized. To run it:

            1. Open the DMG and drag **EKO** into **Applications**.
            2. Right-click **EKO** → **Open** (just the first time) — **or** run:
               ```
               xattr -dr com.apple.quarantine /Applications/EKO.app
               ```

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for what's new.
          releaseDraft: false
          prerelease: false
