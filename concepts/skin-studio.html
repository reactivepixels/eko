<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EKO — Studio</title>
<style>
  /* ============================================================
     EKO — "STUDIO"  (v3 · integrated)
     Matte all-white control surface, fully integrated (no stacked
     panels). Flat-top knobs with a defined bevel + strong seat.
     User-selectable ACCENT (default EKO orange) drives the gauge
     arcs, slider fills, play halo and jewels. EQ genre presets
     animate the band knobs. Every control has a tactile press/turn.
     ============================================================ */
  :root {
    --bg-1:  #e4e0d8;
    --face:  #f3f1ec;
    --face-lo:#e7e3da;
    --chamf: #eae6de;
    --sh:    62, 58, 50;
    --ink:   #3b3933;
    --ink-2: #6d6a61;
    --label: #a4a096;
    /* accent (user-selectable — default EKO orange) */
    --ac:     #ef6a1e;
    --ac-2:   #ff8a42;
    --ac-rgb: 239, 106, 30;
    --gauge:  #26252b;
    --green:  #58b257;
    --font: "Helvetica Neue", "Inter", -apple-system, Helvetica, Arial, sans-serif;
    --mono: "SF Mono", ui-monospace, "Roboto Mono", Menlo, monospace;
    --ease:   cubic-bezier(.34,.02,.2,1);
    --spring: cubic-bezier(.5,1.5,.45,1);
    --in:    inset 2px 2px 5px rgba(var(--sh),.16), inset -2px -2px 5px rgba(255,255,255,.92);
    --in-deep: inset 3px 3px 7px rgba(var(--sh),.22), inset -3px -3px 6px rgba(255,255,255,.9);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; width: 100%; overflow: hidden; }
  body {
    font-family: var(--font); color: var(--ink); -webkit-font-smoothing: antialiased;
    display: grid; place-items: center;
    background:
      radial-gradient(120% 100% at 50% -8%, #f1eee8 0%, transparent 55%),
      radial-gradient(120% 120% at 50% 118%, #d2cdc2 0%, transparent 55%),
      var(--bg-1);
  }
  body::after { content:""; position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(120% 100% at 50% 44%, transparent 56%, rgba(var(--sh),.16) 100%); }

  /* ============ DEVICE ============ */
  .device {
    position: relative; width: min(880px, 95vw); border-radius: 24px; overflow: hidden;
    background: var(--face);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.9), inset 0 0 0 1px rgba(255,255,255,.5),
      0 44px 80px -30px rgba(var(--sh),.5), 0 16px 30px -20px rgba(var(--sh),.4);
    isolation: isolate;
  }
  .device::before {
    content:""; position:absolute; inset:0; z-index:0; pointer-events:none; opacity:.5; mix-blend-mode:soft-light;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='150' height='150'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* brand bevel + accent picker */
  .bevel {
    position: relative; z-index: 3; padding: 15px 26px;
    background: linear-gradient(180deg, #efece6 0%, #f4f2ed 100%);
    box-shadow: inset 0 -1px 0 rgba(255,255,255,.9), 0 1px 0 rgba(var(--sh),.10);
    display: flex; align-items: center; justify-content: space-between;
  }
  .bevel::after { content:""; position:absolute; left:0; right:0; bottom:-1px; height:1px;
    background: linear-gradient(90deg, transparent, rgba(var(--sh),.12) 20%, rgba(var(--sh),.12) 80%, transparent); }
  .brand { display: flex; align-items: flex-end; gap: 10px; }
  .bars { display: flex; align-items: flex-end; gap: 3px; height: 17px; }
  .bars i { width: 3px; border-radius: 1px; transform-origin: bottom; background: #b9b5ab; }
  .bars i:nth-child(1){ height: 7px; } .bars i:nth-child(2){ height: 17px; }
  .bars i:nth-child(3){ height: 11px; } .bars i:nth-child(4){ height: 14px; }
  .bars i.live { background: var(--ac); }
  .playing .bars i { animation: bob 1.6s ease-in-out infinite; }
  .playing .bars i:nth-child(2){ animation-delay:.2s; } .playing .bars i:nth-child(3){ animation-delay:.4s; } .playing .bars i:nth-child(4){ animation-delay:.1s; }
  @keyframes bob { 0%,100%{ transform: scaleY(1);} 50%{ transform: scaleY(.52);} }
  .brand b { font-size: 17px; letter-spacing: .30em; font-weight: 600; color: #8c887e; text-shadow: 0 1px 0 rgba(255,255,255,.85); }
  .brand .sub { font: 9px/1 var(--mono); letter-spacing: .18em; color: var(--label); align-self: center; }

  .apick { display: flex; align-items: center; gap: 7px; }
  .apick .alab { font: 8px/1 var(--mono); letter-spacing: 2px; color: var(--label); text-transform: uppercase; margin-right: 2px; }
  .sw { width: 16px; height: 16px; border-radius: 50%; border: 0; cursor: pointer; padding: 0; background: var(--c);
    box-shadow: inset 0 1px 1px rgba(255,255,255,.45), 0 1px 2px rgba(var(--sh),.25), 0 0 0 1px rgba(0,0,0,.06);
    transition: transform .12s var(--ease); }
  .sw:hover { transform: scale(1.14); }
  .sw:active { transform: scale(.9); }
  .sw.on { box-shadow: 0 0 0 2px var(--face), 0 0 0 3.5px var(--c), inset 0 1px 1px rgba(255,255,255,.4); }

  /* ============ FACE ============ */
  .face { position: relative; z-index: 2; padding: 24px 30px 22px; display: flex; flex-direction: column; gap: 20px; }
  .rule { height: 1px; background: linear-gradient(90deg, transparent, rgba(var(--sh),.10) 12%, rgba(var(--sh),.10) 88%, transparent); }

  /* ---- row 1 ---- */
  .row1 { display: grid; grid-template-columns: 112px 1fr auto; gap: 24px; align-items: center; }
  .art {
    position: relative; width: 112px; height: 112px; border-radius: 12px; overflow: hidden;
    background: url("../site/assets/cover-light.webp") center / cover no-repeat, var(--face);
    box-shadow: inset 0 0 0 4px var(--face), inset 0 0 0 5px rgba(var(--sh),.14),
      0 2px 4px rgba(var(--sh),.18), 0 10px 20px -8px rgba(var(--sh),.3);
  }
  .meta { min-width: 0; }
  .meta .t { font-size: 24px; font-weight: 600; letter-spacing: -.01em; color: var(--ink); line-height: 1.1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meta .a { margin-top: 6px; font-size: 14px; color: var(--ink-2); }
  .meta .f {
    margin-top: 11px; display: inline-flex; align-items: center; gap: 8px; padding: 6px 11px; border-radius: 999px;
    font: 9px/1 var(--mono); letter-spacing: 1.6px; color: var(--ink-2); text-transform: uppercase;
    background: var(--face); box-shadow: var(--in);
  }
  .meta .f .ld { width:6px; height:6px; border-radius:50%; background: var(--green); box-shadow: 0 0 5px rgba(88,178,87,.55); }
  .master { display: flex; flex-direction: column; align-items: center; gap: 11px; }

  /* ---- row 2: EQ (presets + knobs) + cluster ---- */
  .row2 { display: flex; align-items: flex-start; justify-content: space-between; gap: 26px; }
  .eqwrap { display: flex; flex-direction: column; gap: 16px; }
  .eqhead { display: flex; align-items: center; gap: 12px; }
  .eqtitle { font: 9px/1 var(--mono); letter-spacing: 2px; color: var(--label); text-transform: uppercase; }
  .eqpresets { display: flex; gap: 6px; }
  .pill {
    font: 8.5px/1 var(--mono); letter-spacing: 1px; text-transform: uppercase; color: var(--ink-2);
    padding: 7px 10px; border-radius: 999px; cursor: pointer; border: 0; background: var(--face);
    box-shadow: 0 2px 4px -1px rgba(var(--sh),.2), inset 0 1px 1px rgba(255,255,255,.85), 0 0 0 1px rgba(255,255,255,.4);
    transition: transform .08s var(--ease), color .2s, box-shadow .2s;
  }
  .pill:hover { color: var(--ink); }
  .pill:active { transform: translateY(1px) scale(.97); }
  .pill.on { color: var(--ac); box-shadow: var(--in); }
  .eq { display: flex; gap: 20px; }
  .ctl { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .klabel { font: 10px/1.3 var(--mono); letter-spacing: 1px; color: var(--label); text-transform: uppercase; text-align: center; text-shadow: 0 1px 0 rgba(255,255,255,.7); }
  .klabel b { display: block; color: var(--ink-2); font-size: 11px; letter-spacing: 0; }

  /* ================= THE KNOB (flat top + bevel + strong seat + accent gauge) ================= */
  .knob { position: relative; width: 74px; height: 74px; cursor: grab; touch-action: none; }
  .knob.big { width: 120px; height: 120px; }
  .knob.dragging { cursor: grabbing; }
  .knob::before {
    content:""; position:absolute; inset:0; border-radius:50%;
    box-shadow: inset 0 1px 2px rgba(var(--sh),.10), inset 0 -1px 1px rgba(255,255,255,.6);
    transition: box-shadow .18s var(--ease);
  }
  .knob.dragging::before { box-shadow: inset 0 1px 2px rgba(var(--sh),.10), inset 0 -1px 1px rgba(255,255,255,.6), 0 0 0 2px rgba(var(--ac-rgb),.22); }
  .arc { position:absolute; inset:0; width:100%; height:100%; transform: rotate(135deg); overflow: visible; }
  .arc .trk { fill:none; stroke: var(--gauge); stroke-width: 5; stroke-linecap: round; stroke-dasharray: 75 100; }
  .arc .val { fill:none; stroke: var(--ac); stroke-width: 5; stroke-linecap: round; stroke-dasharray: 0 100;
    filter: drop-shadow(0 0 2px rgba(var(--ac-rgb),.5)); transition: stroke-dasharray .45s var(--ease); }
  .knob.dragging .arc .val { transition: none; }
  .knob .body {
    position:absolute; inset: 8%; border-radius:50%;
    background: linear-gradient(155deg, #ffffff 0%, #f3efe8 44%, #d4cfc4 100%);
    box-shadow:
      0 3px 4px rgba(var(--sh),.30),
      0 16px 26px -8px rgba(var(--sh),.34),
      0 7px 13px -5px rgba(var(--sh),.24),
      inset 0 1.5px 1.5px rgba(255,255,255,.95),
      inset 0 -3px 4px rgba(150,144,132,.18);
  }
  .knob .top {
    position:absolute; inset: 16%; border-radius:50%;
    background: radial-gradient(135% 135% at 50% 38%, #ffffff 0%, #faf8f3 70%, #f5f2eb 100%);
    box-shadow:
      inset 0 1.5px 1px rgba(255,255,255,.95),
      inset 0 -1px 1px rgba(150,144,132,.05),
      0 0 0 1px rgba(255,255,255,.6),
      0 4px 8px rgba(var(--sh),.26);
  }
  .knob .top::after { content:""; position:absolute; inset:20%; border-radius:50%;
    box-shadow: inset 0 1px 1px rgba(255,255,255,.65), 0 0 0 1px rgba(var(--sh),.045); }
  .knob .dial { position:absolute; inset: 16%; border-radius:50%; transform: rotate(-90deg);
    transition: transform .45s var(--ease); }
  .knob.dragging .dial { transition: none; }
  .knob .ind {
    position:absolute; top: 9%; left:50%; width:7px; height:7px; margin-left:-3.5px; border-radius:50%;
    background:#807c72; box-shadow: inset 0 1px 1px rgba(0,0,0,.4), 0 1px 0 rgba(255,255,255,.55);
  }
  .knob.big .ind { width:9px; height:9px; margin-left:-4.5px; }

  /* ---- switches + meter ---- */
  .cluster { display: flex; align-items: flex-start; gap: 24px; padding-top: 4px; }
  .switches { display: flex; gap: 20px; }
  .slide {
    position: relative; width: 50px; height: 26px; border-radius: 14px; cursor: pointer; overflow: hidden;
    background: var(--face); box-shadow: var(--in);
  }
  .slide .vfill {
    position:absolute; inset:3px; border-radius:11px; opacity:0; transition: opacity .22s;
    background: linear-gradient(180deg, var(--ac-2), var(--ac));
    box-shadow: inset 0 1px 2px rgba(255,255,255,.35), 0 0 10px rgba(var(--ac-rgb),.45);
  }
  .slide.on .vfill { opacity: 1; }
  .slide .nub {
    position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 50%; z-index: 2;
    background: radial-gradient(135% 135% at 50% 40%, #fefdfb 0%, #f7f4ef 72%, #efebe3 100%);
    box-shadow: 0 3px 6px rgba(var(--sh),.34), inset 0 1.5px 1px rgba(255,255,255,.9), inset 0 -1px 1px rgba(150,144,132,.06), 0 0 0 1px rgba(255,255,255,.5);
    transition: left .26s var(--spring), transform .1s var(--ease);
  }
  .slide.on .nub { left: 27px; }
  .slide:active .nub { transform: scale(.92); }

  .meterbox { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .meter { display: flex; align-items: center; gap: 5px; padding: 9px 12px; border-radius: 12px; background: var(--face); box-shadow: var(--in); }
  .meter i { width: 6px; height: 14px; border-radius: 2px; background: #ddd9d0; box-shadow: inset 0 1px 1px rgba(var(--sh),.18); transition: background .08s, box-shadow .08s; }
  .meter i.on { background: var(--green); box-shadow: 0 0 5px rgba(88,178,87,.5); }
  .meter i.pk.on { background: var(--ac); box-shadow: 0 0 6px rgba(var(--ac-rgb),.6); }

  /* ---- row 3: transport + seek ---- */
  .row3 { display: grid; grid-template-columns: auto 1fr; gap: 28px; align-items: center; }
  .transport { display: flex; align-items: center; gap: 16px; }
  .pbtn {
    position: relative; width: 56px; height: 56px; border: 0; border-radius: 50%; cursor: pointer; padding: 0;
    background: linear-gradient(158deg, #fffefb 0%, #f0ece5 46%, #d7d2c8 100%);
    box-shadow:
      0 3px 4px rgba(var(--sh),.30),
      0 14px 24px -8px rgba(var(--sh),.32),
      0 6px 12px -5px rgba(var(--sh),.22),
      inset 0 1px 1px rgba(255,255,255,.9);
    transition: transform .07s var(--ease), box-shadow .07s var(--ease);
  }
  .pbtn .top {
    position:absolute; inset: 7%; border-radius:50%; display:grid; place-items:center; color: var(--ink-2);
    background: radial-gradient(135% 135% at 50% 40%, #fefdfb 0%, #f8f6f1 72%, #f4f1ea 100%);
    box-shadow: inset 0 1.5px 1px rgba(255,255,255,.9), inset 0 -1px 1px rgba(150,144,132,.05), 0 0 0 1px rgba(255,255,255,.55), 0 4px 7px rgba(var(--sh),.24);
    transition: box-shadow .07s var(--ease), transform .07s var(--ease);
  }
  /* tactile press — button drops INTO the panel, flat top recesses */
  .pbtn:active { transform: translateY(3px) scale(.985);
    box-shadow: 0 1px 2px rgba(var(--sh),.28), inset 0 2px 5px rgba(150,144,132,.20), inset 0 1px 1px rgba(255,255,255,.55); }
  .pbtn:active .top { box-shadow: inset 0 2px 5px rgba(150,144,132,.30), inset 0 -1px 1px rgba(255,255,255,.5), 0 0 0 1px rgba(255,255,255,.4); transform: scale(.99); }
  .pbtn .top svg { width: 19px; height: 19px; transition: transform .07s var(--ease); }
  .pbtn:active .top svg { transform: scale(.92); }
  .pbtn.play { width: 70px; height: 70px;
    box-shadow:
      0 3px 4px rgba(var(--sh),.30),
      0 16px 28px -8px rgba(var(--sh),.34),
      0 7px 14px -5px rgba(var(--sh),.24),
      0 0 26px -2px rgba(var(--ac-rgb),.5),
      inset 0 1px 1px rgba(255,255,255,.85);
  }
  .pbtn.play:active { transform: translateY(3px) scale(.985);
    box-shadow: 0 1px 2px rgba(var(--sh),.28), 0 0 22px -4px rgba(var(--ac-rgb),.5), inset 0 2px 5px rgba(150,144,132,.2), inset 0 1px 1px rgba(255,255,255,.55); }
  .pbtn.play .top { color: var(--ink); }
  .pbtn.play .top svg { width: 26px; height: 26px; }

  .seekwrap { display: flex; align-items: center; gap: 14px; }
  .tt { font: 10px/1 var(--mono); letter-spacing: .5px; color: var(--ink-2); min-width: 38px; text-shadow: 0 1px 0 rgba(255,255,255,.6); }
  .tt.r { text-align: right; }
  .slot { position: relative; flex: 1; height: 16px; border-radius: 999px; cursor: pointer; background: var(--face); box-shadow: var(--in-deep); }
  .slot .fill { position: absolute; top: 50%; left: 4px; transform: translateY(-50%); height: 5px; width: 36%; border-radius: 999px;
    background: linear-gradient(90deg, rgba(var(--ac-rgb),.55), rgba(var(--ac-rgb),.85)); box-shadow: 0 0 8px rgba(var(--ac-rgb),.4); }
  .slot .nub {
    position: absolute; top: 50%; left: 36%; width: 24px; height: 24px; border-radius: 50%; transform: translate(-50%,-50%);
    background: radial-gradient(135% 135% at 50% 40%, #fefdfb 0%, #f7f4ef 72%, #efebe3 100%);
    box-shadow: 0 3px 4px rgba(var(--sh),.3), 0 6px 12px -3px rgba(var(--sh),.3), inset 0 1.5px 1px rgba(255,255,255,.9), inset 0 -1px 1px rgba(150,144,132,.06), 0 0 0 1px rgba(255,255,255,.5);
    transition: transform .12s var(--ease), box-shadow .12s var(--ease);
  }
  .slot .nub::after { content:""; position:absolute; inset:0; margin:auto; width:6px; height:6px; border-radius:50%; background:#cfcbc1; box-shadow: inset 0 1px 1px rgba(0,0,0,.2); }
  .slot.dragging .nub { transform: translate(-50%,-50%) scale(1.16);
    box-shadow: 0 3px 5px rgba(var(--sh),.32), 0 9px 16px -4px rgba(var(--sh),.32), inset 0 1.5px 1px rgba(255,255,255,.9), 0 0 0 1px rgba(255,255,255,.5), 0 0 0 4px rgba(var(--ac-rgb),.16); }

  /* signal path footer */
  .sig { display: flex; align-items: center; justify-content: center; gap: 12px; font: 9px/1 var(--mono); letter-spacing: 1.5px; color: var(--label); text-transform: uppercase; text-shadow: 0 1px 0 rgba(255,255,255,.6); flex-wrap: wrap; }
  .sig .lab { color: #b6b2a8; margin-right: 5px; } .sig .arrow { color: #c7c2b7; }
  .sig .lock { color: var(--ink-2); } .sig .lock .d { display:inline-block; width:6px; height:6px; border-radius:50%; background: var(--ac); box-shadow: 0 0 6px rgba(var(--ac-rgb),.6); margin-right: 5px; vertical-align: middle; }

  @media (max-width: 760px) {
    .row1 { grid-template-columns: 96px 1fr; } .master { display:none; }
    .row2 { flex-direction: column; align-items: center; }
    .row3 { grid-template-columns: 1fr; justify-items: center; }
    .apick .alab { display:none; }
  }
</style>
</head>
<body>
  <div class="device playing" id="device">
    <div class="bevel">
      <div class="brand">
        <span class="bars"><i></i><i class="live"></i><i></i><i></i></span>
        <b>EKO</b><span class="sub">reference&nbsp;·&nbsp;R1</span>
      </div>
      <div class="apick" id="apick">
        <span class="alab">Accent</span>
        <button class="sw on" data-ac="orange"   style="--c:#ef6a1e" title="EKO Orange"></button>
        <button class="sw"    data-ac="violet"   style="--c:#6a5cf0" title="Violet"></button>
        <button class="sw"    data-ac="blue"     style="--c:#2f8fff" title="Blue"></button>
        <button class="sw"    data-ac="teal"     style="--c:#13b5a6" title="Teal"></button>
        <button class="sw"    data-ac="graphite" style="--c:#6f6c63" title="Graphite (mono)"></button>
      </div>
    </div>

    <div class="face">
      <!-- row 1 -->
      <div class="row1">
        <div class="art"></div>
        <div class="meta">
          <div class="t">Resonance</div>
          <div class="a">EKO — Generated Ambient</div>
          <div class="f"><span class="ld"></span>FLAC · 96 kHz · 24-bit</div>
        </div>
        <div class="master">
          <div class="knob big" data-val="0.62" id="vol">
            <svg class="arc" viewBox="0 0 100 100"><circle class="trk" cx="50" cy="50" r="45" pathLength="100"/><circle class="val" cx="50" cy="50" r="45" pathLength="100"/></svg>
            <div class="body"></div><div class="top"></div><div class="dial"><i class="ind"></i></div>
          </div>
          <div class="klabel">Volume<b>−6 dB</b></div>
        </div>
      </div>

      <div class="rule"></div>

      <!-- row 2 -->
      <div class="row2">
        <div class="eqwrap">
          <div class="eqhead">
            <span class="eqtitle">Equaliser</span>
            <div class="eqpresets" id="eqpresets">
              <button class="pill" data-preset="Flat">Flat</button>
              <button class="pill on" data-preset="Jazz">Jazz</button>
              <button class="pill" data-preset="Rock">Rock</button>
              <button class="pill" data-preset="Classical">Classical</button>
              <button class="pill" data-preset="Vocal">Vocal</button>
              <button class="pill" data-preset="Electronic">Electronic</button>
            </div>
          </div>
          <div class="eq" id="eq"></div>
        </div>
        <div class="cluster">
          <div class="switches">
            <div class="ctl"><div class="slide on" data-toggle><span class="vfill"></span><span class="nub"></span></div><div class="klabel">Bit-Perfect</div></div>
            <div class="ctl"><div class="slide on" data-toggle><span class="vfill"></span><span class="nub"></span></div><div class="klabel">Gapless</div></div>
          </div>
          <div class="meterbox"><div class="meter" id="meter"></div><div class="klabel">Signal</div></div>
        </div>
      </div>

      <div class="rule"></div>

      <!-- row 3 -->
      <div class="row3">
        <div class="transport">
          <button class="pbtn" title="Previous"><span class="top"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5v14h2V5H6zm3 7 10 7V5L9 12z"/></svg></span></button>
          <button class="pbtn play" id="play" title="Play / Pause"><span class="top"><svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg></span></button>
          <button class="pbtn" title="Next"><span class="top"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 5v14h-2V5h2zM15 12 5 5v14l10-7z"/></svg></span></button>
        </div>
        <div class="seekwrap">
          <span class="tt">2:01</span>
          <div class="slot" id="slot"><div class="fill" id="fill"></div><div class="nub" id="nub"></div></div>
          <span class="tt r">−2:32</span>
        </div>
      </div>

      <div class="sig">
        <span><span class="lab">Source</span>FLAC 96/24</span><span class="arrow">→</span>
        <span><span class="lab">Output</span>Naim DAC · 96 kHz</span><span class="arrow">→</span>
        <span class="lock"><span class="d"></span>Bit-Perfect · Locked</span>
      </div>
    </div>
  </div>

  <script>
    // ---- EQ presets (5 bands: 60 250 1k 4k 12k; 0.5 = flat / 0 dB) ----
    const EQ_PRESETS = {
      Flat:       [0.50,0.50,0.50,0.50,0.50],
      Jazz:       [0.62,0.54,0.46,0.55,0.60],
      Rock:       [0.70,0.56,0.42,0.58,0.70],
      Classical:  [0.60,0.52,0.50,0.54,0.62],
      Vocal:      [0.44,0.56,0.66,0.60,0.50],
      Electronic: [0.74,0.60,0.44,0.58,0.72],
    };
    const BANDS = ['60','250','1k','4k','12k'];

    // ---- build EQ knobs (default to the highlighted preset: Jazz) ----
    const eq = document.getElementById('eq');
    const initial = EQ_PRESETS.Jazz;
    BANDS.forEach((lab,i)=>{
      const c = document.createElement('div'); c.className='ctl';
      c.innerHTML = `<div class="knob" data-val="${initial[i]}">
        <svg class="arc" viewBox="0 0 100 100"><circle class="trk" cx="50" cy="50" r="45" pathLength="100"/><circle class="val" cx="50" cy="50" r="45" pathLength="100"/></svg>
        <div class="body"></div><div class="top"></div><div class="dial"><i class="ind"></i></div>
      </div><div class="klabel">${lab}</div>`;
      eq.appendChild(c);
    });

    // ---- knob behaviour (returns a programmatic setter for presets) ----
    function bindKnob(knob){
      const val = knob.querySelector('.val'), dial = knob.querySelector('.dial');
      let v = parseFloat(knob.dataset.val || '0.5');
      function render(){ val.style.strokeDasharray = (v*75).toFixed(2)+' 100'; dial.style.transform = 'rotate('+(v*270-135)+'deg)'; }
      render();
      let down=false, sy=0, sv=0;
      knob.addEventListener('pointerdown', e=>{ down=true; knob.classList.add('dragging'); sy=e.clientY; sv=v; knob.setPointerCapture(e.pointerId); e.preventDefault(); });
      knob.addEventListener('pointermove', e=>{ if(!down) return; v=Math.max(0,Math.min(1, sv+(sy-e.clientY)/165)); render(); });
      function up(){ if(!down) return; down=false; knob.classList.remove('dragging'); }
      knob.addEventListener('pointerup', up); knob.addEventListener('pointercancel', up);
      return (nv)=>{ v=Math.max(0,Math.min(1,nv)); render(); };
    }
    const eqSet = Array.from(document.querySelectorAll('.eq .knob')).map(bindKnob);
    bindKnob(document.getElementById('vol'));

    // ---- EQ preset selection (animates the band knobs) ----
    document.querySelectorAll('#eqpresets .pill').forEach(p=>{
      p.addEventListener('click', ()=>{
        document.querySelectorAll('#eqpresets .pill').forEach(x=>x.classList.remove('on'));
        p.classList.add('on');
        const vals = EQ_PRESETS[p.dataset.preset];
        vals.forEach((v,i)=> eqSet[i] && eqSet[i](v));
      });
    });

    // ---- accent picker ----
    const ACCENTS = {
      orange:   ['#ef6a1e','#ff8a42','239, 106, 30'],
      violet:   ['#6a5cf0','#8d7dff','106, 92, 240'],
      blue:     ['#2f8fff','#5cabff','47, 143, 255'],
      teal:     ['#13b5a6','#3ed6c7','19, 181, 166'],
      graphite: ['#6f6c63','#8a877d','111, 108, 99'],
    };
    function applyAccent(name){
      const a = ACCENTS[name]; if(!a) return;
      document.querySelectorAll('.sw').forEach(x=>x.classList.toggle('on', x.dataset.ac===name));
      const r = document.documentElement.style;
      r.setProperty('--ac', a[0]); r.setProperty('--ac-2', a[1]); r.setProperty('--ac-rgb', a[2]);
    }
    document.querySelectorAll('.sw').forEach(s=> s.addEventListener('click', ()=> applyAccent(s.dataset.ac)));
    // deep-link / preview an accent via ?ac=violet (etc.)
    const qac = new URLSearchParams(location.search).get('ac');
    if (qac) applyAccent(qac);

    // ---- toggles ----
    document.querySelectorAll('[data-toggle]').forEach(s=> s.addEventListener('click', ()=> s.classList.toggle('on')));

    // ---- LED signal meter ----
    const meter = document.getElementById('meter');
    const M = 12, mled = [];
    for (let i=0;i<M;i++){ const el=document.createElement('i'); if(i>=M-2) el.className='pk'; meter.appendChild(el); mled.push(el); }
    let playing = true, lvl = 0.6, tm = 0;
    function meterTick(){
      tm += 0.04;
      const tgt = playing ? (0.45 + 0.4*(Math.sin(tm*1.7)*0.5+0.5) + 0.12*Math.sin(tm*5.3)) : 0.04;
      lvl += (tgt - lvl) * 0.25;
      const lit = Math.round(Math.max(0,Math.min(1,lvl)) * M);
      mled.forEach((el,i)=> el.classList.toggle('on', i<lit));
      requestAnimationFrame(meterTick);
    }
    meterTick();

    // ---- play / pause ----
    const device = document.getElementById('device'), play = document.getElementById('play'), icon = document.getElementById('playIcon');
    play.addEventListener('click', ()=>{
      playing = !playing; device.classList.toggle('playing', playing);
      icon.innerHTML = playing ? '<rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/>' : '<path d="M7 4v16l13-8z"/>';
    });

    // ---- seek (with grab feedback) ----
    const slot = document.getElementById('slot'), fill = document.getElementById('fill'), nub = document.getElementById('nub');
    function setSeek(p){ p=Math.max(0,Math.min(1,p)); fill.style.width='calc('+(p*100)+'% - 10px)'; nub.style.left=(p*100)+'%'; }
    setSeek(.44);
    let sdown=false;
    slot.addEventListener('pointerdown', e=>{ sdown=true; slot.classList.add('dragging'); slot.setPointerCapture(e.pointerId); s(e); });
    slot.addEventListener('pointermove', e=>{ if(sdown) s(e); });
    function sup(){ sdown=false; slot.classList.remove('dragging'); }
    slot.addEventListener('pointerup', sup); slot.addEventListener('pointercancel', sup);
    function s(e){ const r=slot.getBoundingClientRect(); setSeek((e.clientX-r.left)/r.width); }
  </script>
</body>
</html>
