<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#26292f" />
      <stop offset="1" stop-color="#1a1c21" />
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34383f" />
      <stop offset="1" stop-color="#1d2025" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- icon tile -->
  <g transform="translate(120,195)">
    <rect width="240" height="240" rx="54" fill="url(#tile)"
      stroke="#ffffff" stroke-opacity="0.06" stroke-width="1" />
    <g transform="translate(0,0) scale(2.4)">
      <rect x="26" y="24" width="48" height="11" rx="5.5" fill="#ef6a1e" />
      <rect x="26" y="44.5" width="38" height="11" rx="5.5" fill="#eceef0" />
      <rect x="26" y="65" width="48" height="11" rx="5.5" fill="#eceef0" />
    </g>
  </g>

  <!-- wordmark + tagline -->
  <g font-family="Helvetica Neue, Inter, -apple-system, sans-serif">
    <text x="430" y="290" fill="#eceef0" font-size="150" font-weight="700"
      letter-spacing="6">EKO</text>
    <text x="434" y="358" fill="#a3a6ad" font-size="33" font-weight="400">
      A bit-perfect audiophile music player for macOS.
    </text>
    <text x="434" y="408" fill="#ef6a1e" font-size="22" font-weight="600"
      letter-spacing="2" font-family="SF Mono, ui-monospace, Menlo, monospace">
      NATIVE RUST ENGINE · OPEN SOURCE
    </text>
  </g>
</svg>
