<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EKO — Liquid</title>
<style>
  /* ============================================================
     EKO · "LIQUID / KINETIC"
     soft, alive, breathing — motion is the hero
     ============================================================ */

  :root {
    --pink:  #ffd6e8;
    --cyan:  #d6f0ff;
    --lilac: #e8ddff;
    --peach: #ffe6d6;
    --mint:  #d9f7ec;

    --ink:      #3a3550;   /* deep slate text */
    --ink-soft: #6c6585;
    --ink-faint:#9a93b0;

    --glass:        rgba(255,255,255,0.46);
    --glass-strong: rgba(255,255,255,0.62);
    --glass-line:   rgba(255,255,255,0.75);

    --r-card: 28px;
    --r-cover: 22px;

    --font: -apple-system, "SF Pro Rounded", "SF Pro Display",
            ui-rounded, "Segoe UI", "Helvetica Neue", system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    font-family: var(--font);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
  }

  body {
    display: grid;
    place-items: center;
    background: #f6f1fb;
    min-height: 100vh;
  }

  /* ---------------------------------------------------------
     BREATHING IRIDESCENT BACKGROUND
     several big radial blooms drifting very slowly
     --------------------------------------------------------- */
  .stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
    background:
      radial-gradient(120% 120% at 50% 0%, #fdf7ff 0%, #f3edfb 55%, #eef3fb 100%);
  }

  .bloom {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.9;
    mix-blend-mode: normal;
    will-change: transform;
  }
  .bloom.b1 {
    width: 60vmax; height: 60vmax;
    left: -10vmax; top: -18vmax;
    background: radial-gradient(circle at 50% 50%, var(--pink) 0%, rgba(255,214,232,0) 70%);
    animation: drift1 19s ease-in-out infinite;
  }
  .bloom.b2 {
    width: 62vmax; height: 62vmax;
    right: -16vmax; top: -10vmax;
    background: radial-gradient(circle at 50% 50%, var(--cyan) 0%, rgba(214,240,255,0) 70%);
    animation: drift2 23s ease-in-out infinite;
  }
  .bloom.b3 {
    width: 66vmax; height: 66vmax;
    left: -8vmax; bottom: -22vmax;
    background: radial-gradient(circle at 50% 50%, var(--lilac) 0%, rgba(232,221,255,0) 70%);
    animation: drift3 27s ease-in-out infinite;
  }
  .bloom.b4 {
    width: 54vmax; height: 54vmax;
    right: -10vmax; bottom: -18vmax;
    background: radial-gradient(circle at 50% 50%, var(--peach) 0%, rgba(255,230,214,0) 70%);
    animation: drift4 21s ease-in-out infinite;
  }
  .bloom.b5 {
    width: 46vmax; height: 46vmax;
    left: 30vmax; top: 26vmax;
    background: radial-gradient(circle at 50% 50%, var(--mint) 0%, rgba(217,247,236,0) 70%);
    animation: drift5 25s ease-in-out infinite;
  }

  @keyframes drift1 {
    0%,100% { transform: translate(0,0) scale(1); }
    33%     { transform: translate(8vmax, 6vmax) scale(1.12); }
    66%     { transform: translate(-4vmax, 10vmax) scale(0.96); }
  }
  @keyframes drift2 {
    0%,100% { transform: translate(0,0) scale(1.05); }
    40%     { transform: translate(-9vmax, 7vmax) scale(0.92); }
    70%     { transform: translate(5vmax, 12vmax) scale(1.1); }
  }
  @keyframes drift3 {
    0%,100% { transform: translate(0,0) scale(1); }
    35%     { transform: translate(10vmax, -8vmax) scale(1.08); }
    65%     { transform: translate(3vmax, -12vmax) scale(0.94); }
  }
  @keyframes drift4 {
    0%,100% { transform: translate(0,0) scale(1.02); }
    45%     { transform: translate(-8vmax, -6vmax) scale(1.12); }
    75%     { transform: translate(-12vmax, 2vmax) scale(0.95); }
  }
  @keyframes drift5 {
    0%,100% { transform: translate(0,0) scale(0.95); }
    50%     { transform: translate(-14vmax, -10vmax) scale(1.15); }
  }

  /* faint frosted noise grain */
  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.035;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  /* ---------------------------------------------------------
     PLAYER SHELL
     --------------------------------------------------------- */
  .player {
    position: relative;
    width: min(720px, 92vw);
    padding: clamp(20px, 3.4vw, 34px);
    display: flex;
    flex-direction: column;
    gap: clamp(16px, 2.4vw, 24px);
    z-index: 2;
    animation: shellFloat 11s ease-in-out infinite;
  }
  @keyframes shellFloat {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-10px); }
  }

  /* shared glass surface */
  .glass {
    background: var(--glass);
    backdrop-filter: blur(26px) saturate(150%);
    -webkit-backdrop-filter: blur(26px) saturate(150%);
    border: 1px solid var(--glass-line);
    border-radius: var(--r-card);
    box-shadow:
      0 24px 60px -24px rgba(95, 80, 140, 0.42),
      0 4px 18px -8px rgba(95, 80, 140, 0.18),
      inset 0 1px 0 rgba(255,255,255,0.8);
  }

  /* ---- top bar : wordmark + bit-perfect seal ---- */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .wordmark {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px 10px 14px;
  }
  .wordmark .bars {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 22px;
  }
  .wordmark .bars i {
    width: 4px;
    border-radius: 4px;
    background: linear-gradient(180deg, #b9a8ff, #ff9fce);
    box-shadow: 0 2px 6px rgba(160,120,220,0.4);
    animation: eqbar 2.6s ease-in-out infinite;
  }
  .wordmark .bars i:nth-child(1){ height: 9px;  animation-delay: 0s;    }
  .wordmark .bars i:nth-child(2){ height: 18px; animation-delay: .35s;  }
  .wordmark .bars i:nth-child(3){ height: 13px; animation-delay: .7s;   }
  .wordmark .bars i:nth-child(4){ height: 21px; animation-delay: 1.05s; }
  @keyframes eqbar {
    0%,100% { transform: scaleY(0.6); }
    50%     { transform: scaleY(1); }
  }
  .wordmark span {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.14em;
    color: var(--ink);
  }

  .seal {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 10px 18px 10px 14px;
    border-radius: 999px;
    font-size: 12.5px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: #2f6a52;
    background: linear-gradient(120deg, rgba(217,247,236,0.85), rgba(214,240,255,0.7));
    border: 1px solid rgba(255,255,255,0.85);
    box-shadow:
      0 8px 22px -10px rgba(60,160,120,0.5),
      inset 0 1px 0 rgba(255,255,255,0.9);
    animation: sealGlow 4.5s ease-in-out infinite;
  }
  @keyframes sealGlow {
    0%,100% { box-shadow: 0 8px 22px -10px rgba(60,160,120,0.45), inset 0 1px 0 rgba(255,255,255,0.9); }
    50%     { box-shadow: 0 10px 30px -8px rgba(60,180,140,0.7),  inset 0 1px 0 rgba(255,255,255,0.95); }
  }
  .seal .check {
    width: 20px; height: 20px;
    border-radius: 50%;
    display: grid; place-items: center;
    background: linear-gradient(135deg, #7fe3bf, #5cc6a4);
    box-shadow: 0 2px 8px rgba(60,180,140,0.5);
  }
  .seal .check svg { width: 11px; height: 11px; }

  /* ---- now playing card ---- */
  .now {
    display: flex;
    gap: clamp(16px, 2.6vw, 26px);
    align-items: center;
    padding: clamp(18px, 2.6vw, 26px);
  }

  .cover {
    position: relative;
    flex: 0 0 auto;
    width: clamp(112px, 20vw, 150px);
    aspect-ratio: 1;
    border-radius: var(--r-cover);
    overflow: hidden;
    box-shadow:
      0 20px 44px -16px rgba(120, 90, 170, 0.55),
      inset 0 0 0 1px rgba(255,255,255,0.5);
    background: #fff;
  }
  .cover .art {
    position: absolute;
    inset: -40%;
    background:
      radial-gradient(60% 60% at 25% 25%, var(--pink) 0%, rgba(255,214,232,0) 60%),
      radial-gradient(60% 60% at 80% 20%, var(--cyan) 0%, rgba(214,240,255,0) 62%),
      radial-gradient(70% 70% at 75% 85%, var(--lilac) 0%, rgba(232,221,255,0) 64%),
      radial-gradient(60% 60% at 20% 85%, var(--peach) 0%, rgba(255,230,214,0) 60%),
      linear-gradient(135deg, #fff0fa, #eef4ff);
    filter: blur(2px);
    animation: artSwirl 16s linear infinite;
  }
  @keyframes artSwirl {
    0%   { transform: rotate(0deg)   scale(1.1); }
    100% { transform: rotate(360deg) scale(1.1); }
  }
  .cover .gloss {
    position: absolute; inset: 0;
    background: linear-gradient(160deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 42%);
  }

  .meta { min-width: 0; }
  .meta .title {
    font-size: clamp(22px, 3.4vw, 32px);
    font-weight: 500;
    line-height: 1.12;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .meta .artist {
    margin-top: 8px;
    font-size: clamp(15px, 2vw, 18px);
    font-weight: 500;
    color: var(--ink-soft);
  }
  .meta .format {
    margin-top: 14px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12.5px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--ink-soft);
    padding: 7px 13px;
    border-radius: 999px;
    background: rgba(255,255,255,0.55);
    border: 1px solid rgba(255,255,255,0.8);
  }
  .meta .format .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: linear-gradient(135deg, #ff9fce, #9db8ff);
    box-shadow: 0 0 8px rgba(180,150,255,0.8);
  }

  /* ---- liquid spectrum ---- */
  .spectrum {
    height: clamp(70px, 11vw, 104px);
    padding: 0 clamp(10px, 2vw, 18px);
    display: grid;
    place-items: stretch;
    overflow: hidden;
  }
  .spectrum svg { width: 100%; height: 100%; display: block; }

  /* ---- seek ---- */
  .seek {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 4px 6px;
  }
  .seek .t {
    font-variant-numeric: tabular-nums;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    width: 44px;
    text-align: center;
    flex: 0 0 auto;
  }
  .track {
    position: relative;
    flex: 1;
    height: 8px;
    border-radius: 999px;
    background: rgba(120, 100, 160, 0.16);
    box-shadow: inset 0 1px 2px rgba(90,70,140,0.18);
  }
  .track .fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 38%;
    border-radius: 999px;
    background: linear-gradient(90deg, #ffb3da, #b9a8ff 55%, #9fd6ff);
    box-shadow: 0 0 14px rgba(180,150,255,0.55);
  }
  .track .thumb {
    position: absolute;
    top: 50%;
    left: 38%;
    width: 18px; height: 18px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #ffffff, #f0e9ff);
    box-shadow:
      0 0 0 4px rgba(255,255,255,0.55),
      0 4px 12px rgba(150,120,210,0.6),
      0 0 18px rgba(180,150,255,0.7);
    animation: thumbPulse 3.2s ease-in-out infinite;
  }
  @keyframes thumbPulse {
    0%,100% { box-shadow: 0 0 0 4px rgba(255,255,255,0.55), 0 4px 12px rgba(150,120,210,0.55), 0 0 14px rgba(180,150,255,0.55); }
    50%     { box-shadow: 0 0 0 5px rgba(255,255,255,0.7),  0 4px 14px rgba(150,120,210,0.7),  0 0 24px rgba(180,150,255,0.9); }
  }

  /* ---- controls row ---- */
  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: clamp(12px, 2vw, 20px);
    padding: clamp(8px, 1.4vw, 14px) clamp(10px, 2vw, 16px);
  }
  .cluster { display: flex; align-items: center; gap: clamp(10px, 1.6vw, 16px); }

  .pill {
    display: grid; place-items: center;
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.5);
    color: var(--ink);
    cursor: pointer;
    transition: transform .25s cubic-bezier(.2,.8,.3,1.2), background .25s, box-shadow .25s;
    box-shadow: 0 6px 16px -8px rgba(95,80,140,0.4), inset 0 1px 0 rgba(255,255,255,0.9);
  }
  .pill:hover { transform: translateY(-2px) scale(1.06); background: rgba(255,255,255,0.72); }
  .pill:active { transform: scale(0.96); }
  .pill svg { width: 19px; height: 19px; }
  .pill.small { width: 42px; height: 42px; color: var(--ink-soft); }
  .pill.small svg { width: 16px; height: 16px; }

  /* the pulsing ORB play/pause */
  .orb {
    position: relative;
    width: 76px; height: 76px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: grid; place-items: center;
    background:
      radial-gradient(circle at 32% 28%, #ffffff 0%, rgba(255,255,255,0) 38%),
      conic-gradient(from 140deg, #ffb3da, #c5b0ff, #a9dcff, #ffd9c2, #ffb3da);
    box-shadow:
      0 14px 34px -10px rgba(150,110,210,0.6),
      0 0 0 1px rgba(255,255,255,0.6) inset;
    color: #fff;
    transition: transform .3s cubic-bezier(.2,.8,.3,1.2);
    animation: orbSpin 14s linear infinite;
  }
  @keyframes orbSpin {
    0%   { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(360deg); }
  }
  .orb::after {
    content: "";
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,160,255,0.55), rgba(200,160,255,0) 70%);
    z-index: -1;
    animation: orbHalo 3.4s ease-in-out infinite;
  }
  @keyframes orbHalo {
    0%,100% { transform: scale(1);    opacity: 0.7; }
    50%     { transform: scale(1.22); opacity: 0.35; }
  }
  .orb:hover { transform: scale(1.05); }
  .orb:active { transform: scale(0.95); }
  .orb svg { width: 26px; height: 26px; filter: drop-shadow(0 1px 3px rgba(120,80,170,0.5)); }

  /* ---- volume ---- */
  .volume {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 0 0 auto;
  }
  .volume svg { width: 17px; height: 17px; color: var(--ink-soft); flex: 0 0 auto; }
  .vtrack {
    position: relative;
    width: clamp(74px, 12vw, 120px);
    height: 6px;
    border-radius: 999px;
    background: rgba(120,100,160,0.16);
  }
  .vtrack .vfill {
    position: absolute; left:0; top:0; bottom:0;
    width: 64%;
    border-radius: 999px;
    background: linear-gradient(90deg, #b9a8ff, #9fd6ff);
  }
  .vtrack .vthumb {
    position: absolute; top: 50%; left: 64%;
    width: 14px; height: 14px;
    transform: translate(-50%,-50%);
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff, #efeaff);
    box-shadow: 0 2px 8px rgba(150,120,210,0.55), 0 0 10px rgba(180,150,255,0.5);
  }

  /* ---- signal path ---- */
  .signal {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(8px, 1.4vw, 14px);
    flex-wrap: wrap;
    padding: 14px 18px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--ink-soft);
  }
  .node {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 9px 16px;
    border-radius: 999px;
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(255,255,255,0.8);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    white-space: nowrap;
  }
  .node .lbl { color: var(--ink-faint); font-size: 10px; letter-spacing: 0.14em; }
  .node .val { color: var(--ink); }
  .arrow {
    color: var(--ink-faint);
    display: grid; place-items: center;
  }
  .arrow svg { width: 16px; height: 16px; }
  .node.perfect {
    color: #2f6a52;
    background: linear-gradient(120deg, rgba(217,247,236,0.9), rgba(214,240,255,0.7));
    box-shadow: 0 8px 20px -10px rgba(60,160,120,0.5), inset 0 1px 0 rgba(255,255,255,0.9);
  }
  .node.perfect .mini {
    width: 16px; height: 16px; border-radius: 50%;
    display: grid; place-items: center;
    background: linear-gradient(135deg, #7fe3bf, #5cc6a4);
  }
  .node.perfect .mini svg { width: 9px; height: 9px; }

  @media (max-width: 560px) {
    .signal .arrow { display: none; }
    .now { flex-direction: column; text-align: center; align-items: center; }
    .meta .format { margin-left: auto; margin-right: auto; }
  }
</style>
</head>
<body>

  <div class="stage" aria-hidden="true">
    <div class="bloom b1"></div>
    <div class="bloom b2"></div>
    <div class="bloom b3"></div>
    <div class="bloom b4"></div>
    <div class="bloom b5"></div>
  </div>
  <div class="grain" aria-hidden="true"></div>

  <main class="player">

    <!-- top bar -->
    <header class="topbar">
      <div class="wordmark glass">
        <span class="bars"><i></i><i></i><i></i><i></i></span>
        <span>EKO</span>
      </div>
      <div class="seal">
        <span class="check">
          <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
        BIT-PERFECT
      </div>
    </header>

    <!-- now playing -->
    <section class="now glass">
      <div class="cover">
        <div class="art"></div>
        <div class="gloss"></div>
      </div>
      <div class="meta">
        <div class="title">Emergency On Planet&nbsp;Earth <span style="color:var(--ink-faint);font-weight:400;">(Remastered)</span></div>
        <div class="artist">Jamiroquai</div>
        <div class="format"><span class="dot"></span>FLAC · 44.1&nbsp;kHz · 16-bit</div>
      </div>
    </section>

    <!-- liquid spectrum -->
    <section class="spectrum glass" aria-hidden="true">
      <svg viewBox="0 0 600 120" preserveAspectRatio="none">
        <defs>
          <linearGradient id="liquid" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
            <stop offset="0"    stop-color="#ffb3da"/>
            <stop offset="0.33" stop-color="#c5b0ff"/>
            <stop offset="0.66" stop-color="#a9dcff"/>
            <stop offset="1"    stop-color="#ffd9c2"/>
          </linearGradient>
          <linearGradient id="liquidFade" x1="0" y1="0" x2="0" y2="120" gradientUnits="userSpaceOnUse">
            <stop offset="0"   stop-color="#c5b0ff" stop-opacity="0.55"/>
            <stop offset="1"   stop-color="#a9dcff" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <path id="waveFill" fill="url(#liquidFade)"></path>
        <path id="wave1" fill="none" stroke="url(#liquid)" stroke-width="4" stroke-linecap="round" opacity="0.9"></path>
        <path id="wave2" fill="none" stroke="url(#liquid)" stroke-width="2.5" stroke-linecap="round" opacity="0.45"></path>
      </svg>
    </section>

    <!-- seek -->
    <section class="seek glass">
      <span class="t">1:47</span>
      <div class="track">
        <div class="fill"></div>
        <div class="thumb"></div>
      </div>
      <span class="t">4:42</span>
    </section>

    <!-- controls -->
    <section class="controls glass">
      <div class="cluster">
        <button class="pill small" aria-label="Shuffle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
        </button>
        <button class="pill" aria-label="Previous">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5a1 1 0 0 1 2 0v14a1 1 0 0 1-2 0V5zm12.5-.3a1 1 0 0 1 .5.9v12.8a1 1 0 0 1-1.5.87L8 13a1 1 0 0 1 0-1.74l9.5-6.27a1 1 0 0 1 1 .02z"/></svg>
        </button>
      </div>

      <button class="orb" aria-label="Play / Pause">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.14v13.72a1 1 0 0 0 1.5.86l11-6.86a1 1 0 0 0 0-1.72l-11-6.86A1 1 0 0 0 8 5.14z"/></svg>
      </button>

      <div class="cluster">
        <button class="pill" aria-label="Next">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 5a1 1 0 0 0-2 0v14a1 1 0 0 0 2 0V5zM5.5 4.7a1 1 0 0 0-.5.9v12.8a1 1 0 0 0 1.5.87L16 13a1 1 0 0 0 0-1.74L6.5 4.99a1 1 0 0 0-1 .02z"/></svg>
        </button>
        <div class="volume">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 5 6 9H3v6h3l5 4V5z"/><path d="M16 8a5 5 0 0 1 0 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M18.5 5.5a8 8 0 0 1 0 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.55"/></svg>
          <div class="vtrack"><div class="vfill"></div><div class="vthumb"></div></div>
        </div>
      </div>
    </section>

    <!-- signal path -->
    <section class="signal glass">
      <span class="node"><span class="lbl">SOURCE</span><span class="val">FLAC · 44.1 kHz · 16-bit</span></span>
      <span class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
      <span class="node"><span class="lbl">OUTPUT</span><span class="val">Chord Mojo · DAC</span></span>
      <span class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
      <span class="node perfect">
        <span class="mini"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        BIT-PERFECT
      </span>
    </section>

  </main>

<script>
  /* ---------------------------------------------------------
     liquid spectrum — smooth flowing wave (no hard bars)
     two phase-shifted sine layers + a soft fill underneath
     --------------------------------------------------------- */
  (function () {
    const W = 600, H = 120, MID = H * 0.52, STEP = 12;
    const w1 = document.getElementById("wave1");
    const w2 = document.getElementById("wave2");
    const wf = document.getElementById("waveFill");

    // multi-octave sine for an organic, breathing motion
    function sample(x, t, ph) {
      const a =
        Math.sin(x * 0.012 + t * 0.9 + ph) * 16 +
        Math.sin(x * 0.026 - t * 1.4 + ph * 1.7) * 9 +
        Math.sin(x * 0.05  + t * 2.1 + ph * 0.6) * 4.5;
      // gentle envelope so the wave swells toward the centre
      const env = 0.55 + 0.45 * Math.sin((x / W) * Math.PI);
      return a * env;
    }

    // build a smooth path with Catmull-Rom-ish stepping
    function buildLine(t, ph, amp) {
      let d = "";
      for (let x = 0; x <= W; x += STEP) {
        const y = MID + sample(x, t, ph) * amp;
        d += (x === 0 ? "M" : "L") + x.toFixed(1) + " " + y.toFixed(1) + " ";
      }
      return d.trim();
    }

    function buildFill(t, ph, amp) {
      let d = "M0 " + H + " ";
      for (let x = 0; x <= W; x += STEP) {
        const y = MID + sample(x, t, ph) * amp;
        d += "L" + x.toFixed(1) + " " + y.toFixed(1) + " ";
      }
      d += "L" + W + " " + H + " Z";
      return d;
    }

    let t = 0;
    function frame() {
      t += 0.012;
      w1.setAttribute("d", buildLine(t, 0, 1));
      w2.setAttribute("d", buildLine(t * 0.8, 2.4, 0.7));
      wf.setAttribute("d", buildFill(t, 0, 1));
      requestAnimationFrame(frame);
    }
    frame();
  })();

  /* play/pause toggle on the orb (purely cosmetic) */
  (function () {
    const orb = document.querySelector(".orb");
    const playIcon = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.14v13.72a1 1 0 0 0 1.5.86l11-6.86a1 1 0 0 0 0-1.72l-11-6.86A1 1 0 0 0 8 5.14z"/></svg>';
    const pauseIcon = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6.5" y="5" width="3.6" height="14" rx="1.6"/><rect x="13.9" y="5" width="3.6" height="14" rx="1.6"/></svg>';
    let playing = true;
    orb.innerHTML = pauseIcon;
    orb.addEventListener("click", () => {
      playing = !playing;
      orb.innerHTML = playing ? pauseIcon : playIcon;
      orb.style.animationPlayState = playing ? "running" : "paused";
    });
  })();
</script>
