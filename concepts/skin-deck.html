<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EKO — Deck</title>
<style>
  /* ============================================================
     EKO — "DECK"
     A warm hi-fi turntable. The album art IS the record label,
     spinning on a grooved platter; the brushed-aluminum TONEARM
     tracks the playhead — drag it to scrub. Champagne-aluminum
     control plate, a warm VU spectrum, and an engraved BRASS
     "BIT-PERFECT" plaque for the seal. Analogue, unhurried.
     ============================================================ */
  :root {
    --plinth-0: #f1ebdf;  /* warm linen highlight */
    --plinth-1: #e7e0d0;  /* plinth face          */
    --plinth-2: #d8d0bd;  /* plinth shade         */
    --plinth-3: #c4bba4;  /* plinth deep          */
    --alu-0:    #f4f2ee;  /* champagne alu hi     */
    --alu-1:    #ddd9d0;
    --alu-2:    #b9b3a6;
    --alu-3:    #948e80;
    --ink:      #2c2820;
    --ink-soft: #6b6456;
    --ink-eng:  #4c463a;
    --brass-0:  #e7c98a;
    --brass-1:  #c79a5b;
    --brass-2:  #9c7536;
    --accent:   #ef6a1e;
    --accent-2: #ff8338;
    --vu-amber: #f0a83c;
    --font: "Helvetica Neue", "Inter", -apple-system, Helvetica, Arial, sans-serif;
    --serif: "Hoefler Text", "Iowan Old Style", Palatino, Georgia, serif;
    --mono: "SF Mono", ui-monospace, "Roboto Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; width: 100%; overflow: hidden; }
  body {
    font-family: var(--font); color: var(--ink); -webkit-font-smoothing: antialiased;
    display: grid; place-items: center;
    background:
      radial-gradient(120% 100% at 50% -8%, #f4efe5 0%, transparent 55%),
      radial-gradient(120% 120% at 50% 120%, #cfc7b4 0%, transparent 55%),
      #ded6c4;
  }
  body::after { content:""; position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(120% 100% at 50% 44%, transparent 54%, rgba(60,52,36,.2) 100%); }

  /* ============ THE PLINTH ============ */
  .deck {
    position: relative; width: min(840px, 95vw); border-radius: 26px;
    padding: 24px 28px 26px;
    background: linear-gradient(160deg, var(--plinth-0) 0%, var(--plinth-1) 40%, var(--plinth-2) 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.85), inset 0 0 0 1px rgba(255,255,255,.4),
      inset 0 -3px 6px rgba(120,100,60,.12),
      0 1px 0 rgba(255,255,255,.6),
      0 36px 64px -26px rgba(70,58,36,.5), 0 14px 26px -18px rgba(70,58,36,.4);
    isolation: isolate;
  }
  .deck::before { /* faint warm felt texture */
    content:""; position:absolute; inset:0; border-radius:26px; pointer-events:none; z-index:0;
    opacity:.5; mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/></svg>");
  }

  /* ============ HEADER ============ */
  .head { position: relative; z-index: 2; display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .badge {
    display: flex; align-items: center; gap: 11px; padding: 9px 15px; border-radius: 11px;
    background: linear-gradient(160deg, var(--alu-0), var(--alu-1) 55%, var(--alu-2));
    box-shadow: inset 0 1px 1px rgba(255,255,255,.9), inset 0 -2px 3px rgba(120,110,90,.3),
      0 3px 7px -2px rgba(70,58,36,.4), 0 0 0 1px rgba(255,255,255,.4);
  }
  .badge::before { /* brushed */
    content:""; position:absolute; }
  .bars { display: flex; align-items: flex-end; gap: 3px; height: 18px; }
  .bars i { width: 3px; border-radius: 1px; transform-origin: bottom;
    background: linear-gradient(180deg, var(--accent-2), var(--accent)); box-shadow: 0 0 5px rgba(239,106,30,.4); }
  .bars i:nth-child(1){ height: 8px; } .bars i:nth-child(2){ height: 18px; }
  .bars i:nth-child(3){ height: 11px; } .bars i:nth-child(4){ height: 14px; }
  .playing .bars i { animation: bob 1.5s ease-in-out infinite; }
  .playing .bars i:nth-child(2){ animation-delay:.18s; } .playing .bars i:nth-child(3){ animation-delay:.36s; } .playing .bars i:nth-child(4){ animation-delay:.1s; }
  @keyframes bob { 0%,100%{ transform: scaleY(1);} 50%{ transform: scaleY(.5);} }
  .badge b { font-size: 15px; letter-spacing: .32em; color: var(--ink-eng); text-shadow: 0 1px 0 rgba(255,255,255,.8); }
  .speed {
    display: flex; align-items: center; gap: 10px; font: 9px/1 var(--mono); letter-spacing: 2px; color: var(--ink-soft);
    text-transform: uppercase; text-shadow: 0 1px 0 rgba(255,255,255,.6);
  }
  .speed .rpm { padding: 6px 11px; border-radius: 7px; background: linear-gradient(180deg, var(--alu-0), var(--alu-2));
    box-shadow: inset 0 1px 1px rgba(255,255,255,.8), inset 0 -1px 2px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.18);
    color: var(--ink-eng); letter-spacing: 1px; font-weight: 700; }

  /* ============ BODY: platter | panel ============ */
  .body { position: relative; z-index: 2; display: grid; grid-template-columns: 340px 1fr; gap: 26px; align-items: center; }

  /* ---- platter area ---- */
  .platter-area { position: relative; width: 340px; height: 340px; }
  .mat {
    position: absolute; inset: 0; border-radius: 50%;
    background:
      radial-gradient(circle at 50% 50%, var(--plinth-2) 0%, var(--plinth-3) 78%, #b3a98f 100%);
    box-shadow: inset 0 2px 5px rgba(255,255,255,.6), inset 0 -8px 18px rgba(90,76,46,.25),
      0 10px 22px -10px rgba(70,58,36,.5), 0 0 0 1px rgba(255,255,255,.3);
  }
  .platter {
    position: absolute; inset: 16px; border-radius: 50%; overflow: hidden; cursor: pointer;
    background:
      repeating-radial-gradient(circle at 50% 50%, rgba(255,255,255,.03) 0 1.4px, rgba(0,0,0,.55) 1.4px 2.8px),
      radial-gradient(circle at 50% 42%, #2e2a22 0%, #18140d 64%, #0d0a06 100%);
    box-shadow: inset 0 0 30px rgba(0,0,0,.7), inset 0 2px 4px rgba(255,255,255,.08);
    display: grid; place-items: center;
  }
  /* a soft sheen that sweeps round as it spins */
  .platter .sheen {
    position: absolute; inset: 0; border-radius: 50%; mix-blend-mode: screen; pointer-events: none;
    background: conic-gradient(from 0deg, transparent 0 18%, rgba(255,255,255,.12) 26%, transparent 34% 70%, rgba(255,255,255,.08) 78%, transparent 86%);
  }
  .playing .platter .sheen { animation: sweep 6s linear infinite; }
  @keyframes sweep { to { transform: rotate(360deg); } }
  /* the record label = album art */
  .label {
    position: relative; width: 150px; height: 150px; border-radius: 50%; overflow: hidden;
    background:
      radial-gradient(60% 60% at 30% 26%, #ffd27a 0%, transparent 56%),
      radial-gradient(70% 70% at 76% 32%, #ef6a3a 0%, transparent 58%),
      radial-gradient(80% 80% at 58% 88%, #7a2f5a 0%, transparent 62%),
      linear-gradient(150deg, #3a1f2e 0%, #8a3b2a 52%, #c46a2a 100%);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.12), inset 0 0 20px rgba(0,0,0,.35), 0 0 0 6px rgba(0,0,0,.5);
  }
  .playing .label { animation: spin 4.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .label::after { /* paper-label ring + sheen */
    content:""; position:absolute; inset:0; border-radius:50%;
    background: linear-gradient(135deg, rgba(255,255,255,.16), transparent 40%);
    box-shadow: inset 0 0 0 14px rgba(0,0,0,.04);
  }
  /* spindle */
  .spindle {
    position: absolute; width: 13px; height: 13px; border-radius: 50%; z-index: 6;
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: radial-gradient(circle at 40% 34%, #fff, #c9c3b4 55%, #8f8979 100%);
    box-shadow: inset 0 1px 1px rgba(255,255,255,.9), 0 1px 3px rgba(0,0,0,.6);
  }

  /* ---- tonearm: pivots top-right, head tracks the playhead ---- */
  .tonearm {
    position: absolute; top: -6px; right: -10px; width: 150px; height: 250px; z-index: 7;
    transform-origin: calc(100% - 17px) 17px;
    transform: rotate(var(--arm, 6deg));
    transition: transform .12s ease;
    pointer-events: none;
  }
  .tonearm .pivot {
    position: absolute; top: 4px; right: 4px; width: 30px; height: 30px; border-radius: 50%;
    background: radial-gradient(circle at 40% 34%, var(--alu-0), var(--alu-2) 60%, var(--alu-3) 100%);
    box-shadow: inset 0 1px 1px rgba(255,255,255,.9), inset 0 -2px 3px rgba(0,0,0,.3), 0 3px 6px -1px rgba(0,0,0,.5);
  }
  .tonearm .pivot::after { content:""; position:absolute; inset:0; margin:auto; width:8px; height:8px; border-radius:50%;
    background: radial-gradient(circle at 40% 35%, #6a655a, #2c281f); }
  /* counterweight, behind the pivot */
  .tonearm .weight {
    position: absolute; top: -2px; right: -14px; width: 26px; height: 18px; border-radius: 6px;
    background: linear-gradient(180deg, var(--alu-1), var(--alu-3));
    box-shadow: inset 0 1px 1px rgba(255,255,255,.7), 0 2px 4px rgba(0,0,0,.4);
  }
  /* the tube */
  .tonearm .tube {
    position: absolute; top: 17px; right: 16px; width: 5px; height: 196px; border-radius: 4px;
    transform-origin: top center; transform: rotate(33deg);
    background: linear-gradient(90deg, var(--alu-3), var(--alu-0) 45%, var(--alu-2) 100%);
    box-shadow: 0 1px 0 rgba(255,255,255,.5), 1px 0 2px rgba(0,0,0,.35);
  }
  .tonearm .tube .head {
    position: absolute; bottom: -8px; left: -8px; width: 22px; height: 30px; border-radius: 4px;
    transform: rotate(-12deg);
    background: linear-gradient(180deg, #2b2722, #1a1712);
    box-shadow: inset 0 1px 1px rgba(255,255,255,.18), 0 3px 6px rgba(0,0,0,.5);
  }
  .tonearm .tube .head::after { /* stylus tip glows orange = live */
    content:""; position:absolute; bottom:-4px; left:50%; transform:translateX(-50%);
    width:4px; height:4px; border-radius:50%; background: var(--accent);
    box-shadow: 0 0 7px var(--accent); }

  /* arm rest + cue */
  .cue {
    position: absolute; right: 6px; bottom: 14px; display: flex; align-items: center; gap: 8px;
    font: 8px/1 var(--mono); letter-spacing: 1.5px; color: var(--ink-soft); text-transform: uppercase;
  }
  .cue .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 9px var(--accent); animation: pulse 2.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{ opacity: 1;} 50%{ opacity: .45;} }

  /* ---- right panel ---- */
  .panel { display: flex; flex-direction: column; gap: 18px; min-width: 0; }
  .meta .t { font-family: var(--serif); font-size: clamp(26px, 3.3vw, 38px); font-weight: 600; letter-spacing: -.01em; line-height: 1.04; color: var(--ink); }
  .meta .a { margin-top: 8px; font-size: 15px; color: var(--ink-soft); }
  .meta .f { margin-top: 11px; font: 9.5px/1 var(--mono); letter-spacing: 2.5px; color: var(--ink-soft); text-transform: uppercase; }

  /* progress (mirrors the tonearm) */
  .prog { display: flex; align-items: center; gap: 12px; }
  .tt { font: 10px/1 var(--mono); color: var(--ink-soft); min-width: 36px; text-shadow: 0 1px 0 rgba(255,255,255,.5); }
  .tt.r { text-align: right; }
  .pbar { position: relative; flex: 1; height: 3px; border-radius: 999px; background: rgba(90,76,46,.25);
    box-shadow: inset 0 1px 1px rgba(0,0,0,.15); cursor: pointer; }
  .pbar .pf { position: absolute; left: 0; top: 0; bottom: 0; width: 36%; border-radius: 999px;
    background: linear-gradient(90deg, rgba(239,106,30,.55), var(--accent)); }
  .pbar .pd { position: absolute; left: 36%; top: 50%; width: 12px; height: 12px; border-radius: 50%; transform: translate(-50%,-50%);
    background: radial-gradient(circle at 40% 34%, #fff, var(--accent-2) 55%, var(--accent)); box-shadow: 0 0 8px rgba(239,106,30,.6), 0 1px 2px rgba(0,0,0,.4); }

  /* champagne-aluminum control strip */
  .strip {
    display: flex; align-items: center; gap: 16px; padding: 14px 18px; border-radius: 15px;
    background: linear-gradient(160deg, var(--alu-0) 0%, var(--alu-1) 45%, var(--alu-2) 100%);
    box-shadow: inset 0 1px 1px rgba(255,255,255,.9), inset 0 -3px 6px rgba(120,110,90,.3),
      0 6px 14px -6px rgba(70,58,36,.45), 0 0 0 1px rgba(255,255,255,.4);
  }
  .strip::before { content:""; position:absolute; }
  .knob {
    position: relative; width: 56px; height: 56px; border-radius: 50%; cursor: ns-resize; flex: 0 0 auto;
    background: radial-gradient(circle at 48% 38%, var(--alu-0), var(--alu-2) 64%, var(--alu-3) 100%);
    box-shadow: inset 0 1px 1px rgba(255,255,255,.9), inset 0 -3px 5px rgba(0,0,0,.25), 0 5px 11px -4px rgba(0,0,0,.5);
  }
  .knob::before { content:""; position:absolute; inset:5px; border-radius:50%;
    background: repeating-conic-gradient(from 0deg, #cfc9bc 0 4deg, #a8a294 4deg 8deg);
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 7px), #000 calc(100% - 7px));
            mask: radial-gradient(farthest-side, transparent calc(100% - 7px), #000 calc(100% - 7px)); opacity:.8; }
  .knob .pt { position:absolute; top:8px; left:50%; width:3px; height:12px; margin-left:-1.5px; border-radius:2px;
    background: linear-gradient(180deg, var(--accent-2), var(--accent)); box-shadow: 0 0 5px rgba(239,106,30,.6);
    transform-origin: 50% 20px; transform: rotate(var(--vol, -40deg)); }
  .tkeys { display: flex; align-items: center; gap: 10px; }
  .tk { width: 42px; height: 38px; border:0; border-radius: 10px; cursor: pointer; display: grid; place-items: center; color: var(--ink-soft);
    background: linear-gradient(180deg, var(--alu-0), var(--alu-1) 55%, var(--alu-2));
    box-shadow: inset 0 1px 1px rgba(255,255,255,.9), inset 0 -2px 3px rgba(0,0,0,.18), 0 3px 6px -2px rgba(70,58,36,.4); transition: transform .07s; }
  .tk:hover { color: var(--ink); } .tk:active { transform: translateY(2px); }
  .tk svg { width: 16px; height: 16px; }
  .tk.play { width: 54px; height: 46px; border-radius: 13px; color: #fff;
    background: linear-gradient(180deg, #ff9a4f, #ef6a1e 55%, #cf5510);
    box-shadow: inset 0 1px 1px rgba(255,255,255,.5), inset 0 -2px 5px rgba(120,40,0,.45), 0 5px 13px -4px rgba(239,106,30,.6); }
  .tk.play svg { width: 20px; height: 20px; }

  /* VU spectrum + brass plaque */
  .footer { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .vu { display: flex; align-items: flex-end; gap: 3px; height: 30px; flex: 1; }
  .vu i { flex: 1; height: 8%; border-radius: 1px;
    background: linear-gradient(180deg, var(--vu-amber), rgba(240,168,60,.25));
    box-shadow: 0 0 5px rgba(240,168,60,.35); }
  .plaque {
    position: relative; display: flex; align-items: center; gap: 8px; padding: 8px 13px; border-radius: 6px; flex: 0 0 auto;
    background: linear-gradient(160deg, var(--brass-0) 0%, var(--brass-1) 50%, var(--brass-2) 100%);
    box-shadow: inset 0 1px 1px rgba(255,255,255,.6), inset 0 -2px 3px rgba(90,60,10,.5),
      0 3px 7px -2px rgba(70,50,10,.5), 0 0 0 1px rgba(120,90,40,.5);
  }
  .plaque .scr { position:absolute; top:50%; width:4px; height:4px; border-radius:50%; transform:translateY(-50%);
    background: radial-gradient(circle at 40% 35%, #fff6df, #9c7536); box-shadow: inset 0 0 1px rgba(0,0,0,.4); }
  .plaque .scr.l { left: 5px; } .plaque .scr.r { right: 5px; }
  .plaque b { font: 700 10.5px/1 var(--mono); letter-spacing: 2px; color: #4a3410;
    text-shadow: 0 1px 0 rgba(255,255,255,.45); padding: 0 6px; }

  /* engraved signal line */
  .sig { position: relative; z-index: 2; margin-top: 16px; display: flex; align-items: center; justify-content: center; gap: 11px;
    font: 9px/1 var(--mono); letter-spacing: 1.5px; color: var(--ink-soft); text-transform: uppercase; text-shadow: 0 1px 0 rgba(255,255,255,.5); flex-wrap: wrap; }
  .sig .lab { color: #97907f; margin-right: 5px; } .sig .arrow { color: var(--accent); }

  @media (max-width: 740px) {
    .body { grid-template-columns: 1fr; justify-items: center; }
    .platter-area { width: 300px; height: 300px; }
    .panel { align-items: center; text-align: center; }
    .meta { text-align: center; }
  }
</style>
</head>
<body>
  <div class="deck playing" id="deck">
    <!-- HEADER -->
    <div class="head">
      <div class="badge">
        <span class="bars"><i></i><i></i><i></i><i></i></span>
        <b>EKO</b>
      </div>
      <div class="speed">
        DIRECT&nbsp;DRIVE
        <span class="rpm">96kHz · 24b</span>
      </div>
    </div>

    <!-- BODY -->
    <div class="body">
      <div class="platter-area" id="platterArea">
        <div class="mat"></div>
        <div class="platter" id="platter">
          <div class="sheen"></div>
          <div class="label"></div>
          <div class="spindle"></div>
        </div>
        <div class="tonearm" id="tonearm">
          <div class="weight"></div>
          <div class="pivot"></div>
          <div class="tube"><div class="head"></div></div>
        </div>
        <div class="cue"><span class="dot"></span>PLAY</div>
      </div>

      <div class="panel">
        <div class="meta">
          <div class="t">A Case of You</div>
          <div class="a">Joni Mitchell — Blue</div>
          <div class="f">FLAC · 96 kHz · 24-bit</div>
        </div>

        <div class="prog">
          <span class="tt">2:01</span>
          <div class="pbar" id="pbar"><div class="pf" id="pf"></div><div class="pd" id="pd"></div></div>
          <span class="tt r">−2:32</span>
        </div>

        <div class="strip">
          <div class="knob" id="knob"><span class="pt" id="pt"></span></div>
          <div class="tkeys">
            <button class="tk" title="Previous"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5v14h2V5H6zm3 7 10 7V5L9 12z"/></svg></button>
            <button class="tk play" id="play" title="Play / Pause"><svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg></button>
            <button class="tk" title="Next"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 5v14h-2V5h2zM15 12 5 5v14l10-7z"/></svg></button>
          </div>
        </div>

        <div class="footer">
          <div class="vu" id="vu"></div>
          <div class="plaque"><span class="scr l"></span><b>BIT-PERFECT</b><span class="scr r"></span></div>
        </div>
      </div>
    </div>

    <div class="sig">
      <span><span class="lab">SRC</span>FLAC 96/24</span>
      <span class="arrow">→</span>
      <span><span class="lab">OUT</span>Naim DAC · 96kHz</span>
      <span class="arrow">→</span>
      <span><span class="lab">SEAL</span>UNTOUCHED BITS</span>
    </div>
  </div>

  <script>
    // ---- warm VU spectrum ----
    const vu = document.getElementById('vu');
    const N = 26, bars = [];
    for(let i=0;i<N;i++){ const el=document.createElement('i'); vu.appendChild(el); bars.push(el); }
    const ph = bars.map(()=>Math.random()*Math.PI*2), sp = bars.map(()=>.5+Math.random()*1.1);
    let playing = true, t = 0;
    function tick(){
      t += .045;
      for(let i=0;i<N;i++){
        const c = 1 - Math.abs(i-N/2)/(N/2);
        let v = playing ? (Math.sin(t*sp[i]+ph[i])*.5+.5) : .03;
        v = playing ? (.12 + v*.88)*(.4+c*.6) : .05+c*.02;
        bars[i].style.height = (v*100)+'%';
      }
      requestAnimationFrame(tick);
    }
    tick();

    // ---- seek: progress bar <-> tonearm swing stay in sync ----
    const ARM_OUT = 6, ARM_IN = 24; // degrees: outer groove -> toward label
    const tonearm = document.getElementById('tonearm');
    const pbar = document.getElementById('pbar'), pf = document.getElementById('pf'), pd = document.getElementById('pd');
    function setSeek(p){
      p = Math.max(0, Math.min(1, p));
      pf.style.width = (p*100)+'%'; pd.style.left = (p*100)+'%';
      tonearm.style.setProperty('--arm', (ARM_OUT + p*(ARM_IN-ARM_OUT)) + 'deg');
    }
    setSeek(.44);
    function scrubBar(e){ const r=pbar.getBoundingClientRect(); setSeek((e.clientX-r.left)/r.width); }
    let bdown=false;
    pbar.addEventListener('pointerdown', e=>{ bdown=true; pbar.setPointerCapture(e.pointerId); scrubBar(e); });
    pbar.addEventListener('pointermove', e=>{ if(bdown) scrubBar(e); });
    pbar.addEventListener('pointerup', ()=> bdown=false);

    // drag across the platter to scrub (cueing a record)
    const platterArea = document.getElementById('platterArea');
    let pdown=false;
    function scrubPlatter(e){
      const r = platterArea.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      const dx = e.clientX-cx, dy = e.clientY-cy;
      const dist = Math.hypot(dx,dy) / (r.width/2);      // 0 centre … 1 edge
      setSeek(1 - Math.max(0, Math.min(1, (dist-0.28)/0.66))); // edge=start, centre=end
    }
    platterArea.addEventListener('pointerdown', e=>{ pdown=true; scrubPlatter(e); });
    window.addEventListener('pointermove', e=>{ if(pdown) scrubPlatter(e); });
    window.addEventListener('pointerup', ()=> pdown=false);

    // ---- play / pause ----
    const deck = document.getElementById('deck'), play = document.getElementById('play'), icon = document.getElementById('playIcon');
    play.addEventListener('click', ()=>{
      playing = !playing; deck.classList.toggle('playing', playing);
      icon.innerHTML = playing
        ? '<rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/>'
        : '<path d="M7 4v16l13-8z"/>';
    });

    // ---- volume knob ----
    const knob = document.getElementById('knob'), pt = document.getElementById('pt');
    let kv = .62;
    function setVol(v){ kv=Math.max(0,Math.min(1,v)); pt.style.setProperty('--vol', (-135+kv*270)+'deg'); }
    setVol(kv);
    let kdown=false, ky=0, ks=0;
    knob.addEventListener('pointerdown', e=>{ kdown=true; ky=e.clientY; ks=kv; knob.setPointerCapture(e.pointerId); });
    knob.addEventListener('pointermove', e=>{ if(kdown) setVol(ks+(ky-e.clientY)/150); });
    knob.addEventListener('pointerup', ()=> kdown=false);
  </script>
</body>
</html>
