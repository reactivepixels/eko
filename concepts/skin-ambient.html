<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EKO — Ambient</title>
<style>
  :root {
    --violet: #2a1a3e;
    --magenta: #b5476b;
    --amber: #e8915a;
    --coral: #ff8a6b;
    --coral-soft: rgba(255, 138, 107, 0.55);
    --ink: #f6eef0;
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
    --mono: "SF Mono", ui-monospace, "Menlo", "Roboto Mono", monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #120c18;
    font-family: var(--font);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    isolation: isolate;
  }

  /* ── The art-as-room: a blurred, drifting color mesh ── */
  .art-mesh {
    position: absolute;
    inset: -14%;
    z-index: 0;
    filter: blur(64px) saturate(1.25);
    transform-origin: 55% 45%;
    animation: drift 24s ease-in-out infinite alternate;
    background:
      radial-gradient(48% 56% at 22% 30%, var(--magenta) 0%, transparent 62%),
      radial-gradient(46% 50% at 78% 24%, var(--amber) 0%, transparent 60%),
      radial-gradient(60% 66% at 64% 78%, var(--coral) 0%, transparent 58%),
      radial-gradient(70% 80% at 30% 80%, var(--violet) 0%, transparent 70%),
      linear-gradient(135deg, #1a1026 0%, #3a1f44 45%, #2a1a3e 100%);
  }

  @keyframes drift {
    0%   { transform: scale(1.18) translate(-2%, -1.5%) rotate(-0.6deg); }
    50%  { transform: scale(1.30) translate(2.5%, 1%) rotate(0.4deg); }
    100% { transform: scale(1.22) translate(-1%, 2.5%) rotate(-0.2deg); }
  }

  /* Vignette + scrim for legibility */
  .scrim {
    position: absolute;
    inset: 0;
    z-index: 1;
    background:
      radial-gradient(120% 90% at 50% 40%, transparent 30%, rgba(10, 6, 14, 0.55) 100%),
      linear-gradient(180deg, rgba(8, 4, 12, 0.42) 0%, rgba(8, 4, 12, 0.18) 30%, rgba(8, 4, 12, 0.55) 78%, rgba(6, 3, 10, 0.82) 100%);
    pointer-events: none;
  }

  /* Film grain */
  .grain {
    position: absolute;
    inset: -50%;
    z-index: 2;
    opacity: 0.05;
    pointer-events: none;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    animation: grainShift 0.5s steps(2) infinite;
  }
  @keyframes grainShift {
    0% { transform: translate(0,0); }
    100% { transform: translate(-6px, 4px); }
  }

  /* ── Foreground content ── */
  .content {
    position: relative;
    z-index: 3;
    height: 100%;
    width: 100%;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: clamp(20px, 3.4vw, 44px);
  }

  /* Top bar: wordmark */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .wordmark {
    display: flex;
    align-items: center;
    gap: 11px;
  }
  .eko-bars {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 19px;
  }
  .eko-bars span {
    width: 2px;
    border-radius: 2px;
    background: var(--coral);
    box-shadow: 0 0 8px var(--coral-soft);
    animation: ekoPulse 2.6s ease-in-out infinite;
  }
  .eko-bars span:nth-child(1){ height: 9px;  animation-delay: 0s; }
  .eko-bars span:nth-child(2){ height: 19px; animation-delay: .35s; }
  .eko-bars span:nth-child(3){ height: 13px; animation-delay: .7s; }
  .eko-bars span:nth-child(4){ height: 6px;  animation-delay: 1.05s; }
  @keyframes ekoPulse {
    0%, 100% { opacity: .5; transform: scaleY(.85); }
    50%      { opacity: 1;  transform: scaleY(1.12); }
  }
  .eko-word {
    font-size: 15px;
    font-weight: 300;
    letter-spacing: 6px;
    color: rgba(255,255,255,.92);
    text-shadow: 0 0 18px rgba(255,138,107,.3);
  }

  .topbar .now {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2.5px;
    color: rgba(255,255,255,.42);
    text-transform: uppercase;
  }

  /* Center: cover + meta */
  .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(22px, 3vw, 36px);
    min-height: 0;
  }

  .cover-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .cover {
    width: clamp(220px, 24vw, 300px);
    aspect-ratio: 1;
    border-radius: 14px;
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(52% 58% at 24% 28%, var(--magenta) 0%, transparent 60%),
      radial-gradient(48% 52% at 80% 26%, var(--amber) 0%, transparent 58%),
      radial-gradient(64% 70% at 66% 80%, var(--coral) 0%, transparent 56%),
      radial-gradient(72% 82% at 28% 82%, var(--violet) 0%, transparent 70%),
      linear-gradient(135deg, #20132e 0%, #3a1f44 50%, #2a1a3e 100%);
    box-shadow:
      0 24px 70px rgba(0,0,0,.5),
      0 0 64px rgba(255,138,107,.22),
      inset 0 0 0 1px rgba(255,255,255,.07);
    transition: box-shadow .8s ease;
  }
  .cover::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,.10), transparent 38%);
  }
  .playing .cover {
    animation: bloom 4.5s ease-in-out infinite;
  }
  @keyframes bloom {
    0%, 100% { box-shadow: 0 24px 70px rgba(0,0,0,.5), 0 0 56px rgba(255,138,107,.20), inset 0 0 0 1px rgba(255,255,255,.07); }
    50%      { box-shadow: 0 28px 84px rgba(0,0,0,.55), 0 0 92px rgba(255,138,107,.38), inset 0 0 0 1px rgba(255,255,255,.10); }
  }

  /* Mirrored reflection */
  .reflection {
    width: clamp(220px, 24vw, 300px);
    aspect-ratio: 2.6;
    margin-top: 6px;
    border-radius: 14px;
    overflow: hidden;
    opacity: .26;
    transform: scaleY(-1);
    -webkit-mask-image: linear-gradient(180deg, rgba(0,0,0,.85), transparent 72%);
            mask-image: linear-gradient(180deg, rgba(0,0,0,.85), transparent 72%);
    background:
      radial-gradient(52% 58% at 24% 28%, var(--magenta) 0%, transparent 60%),
      radial-gradient(48% 52% at 80% 26%, var(--amber) 0%, transparent 58%),
      radial-gradient(64% 70% at 66% 80%, var(--coral) 0%, transparent 56%),
      linear-gradient(135deg, #20132e 0%, #3a1f44 50%, #2a1a3e 100%);
    filter: blur(1px);
  }

  .meta {
    text-align: center;
    max-width: 640px;
  }
  .title {
    font-size: clamp(30px, 4.2vw, 46px);
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1.05;
    text-shadow: 0 2px 40px rgba(0,0,0,.5), 0 0 30px rgba(255,138,107,.12);
  }
  .artist {
    margin-top: 12px;
    font-size: 16px;
    font-weight: 400;
    color: rgba(255,255,255,.65);
    letter-spacing: .01em;
  }
  .format {
    margin-top: 14px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(255,255,255,.55);
    text-transform: uppercase;
  }

  /* Bottom: spectrum, controls, signal */
  .bottom {
    display: flex;
    flex-direction: column;
    gap: clamp(14px, 2vw, 22px);
  }

  /* Spectrum */
  .spectrum {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 4px;
    height: 38px;
    opacity: .85;
  }
  .spectrum i {
    width: 2px;
    border-radius: 2px;
    background: linear-gradient(180deg, var(--coral), rgba(181,71,107,.4));
    box-shadow: 0 0 6px rgba(255,138,107,.35);
    height: 10%;
    transition: height .12s ease;
  }

  /* Seek */
  .seek-row {
    display: flex;
    align-items: center;
    gap: 14px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }
  .time {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
    color: rgba(255,255,255,.55);
    min-width: 42px;
  }
  .time.right { text-align: right; }
  .seek {
    position: relative;
    flex: 1;
    height: 14px;
    display: flex;
    align-items: center;
    cursor: pointer;
  }
  .seek-track {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: rgba(255,255,255,.18);
  }
  .seek-fill {
    position: absolute;
    left: 0;
    height: 1px;
    width: 34%;
    background: linear-gradient(90deg, rgba(255,138,107,.5), var(--coral));
  }
  .seek-dot {
    position: absolute;
    left: 34%;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--coral);
    transform: translateX(-50%);
    box-shadow: 0 0 14px var(--coral), 0 0 4px #fff;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(18px, 3vw, 34px);
  }
  .ctrl {
    background: none;
    border: none;
    color: rgba(255,255,255,.72);
    cursor: pointer;
    padding: 6px;
    line-height: 0;
    transition: color .25s ease, transform .25s ease;
  }
  .ctrl:hover { color: #fff; transform: scale(1.08); }
  .ctrl svg { width: 20px; height: 20px; }
  .ctrl.small svg { width: 17px; height: 17px; }

  .play {
    width: 64px; height: 64px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.16);
    color: #fff;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(255,138,107,.3), inset 0 0 0 1px rgba(255,255,255,.04);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: transform .3s ease, box-shadow .5s ease;
  }
  .play:hover { transform: scale(1.05); }
  .playing .play {
    animation: playGlow 4.5s ease-in-out infinite;
  }
  @keyframes playGlow {
    0%,100% { box-shadow: 0 0 26px rgba(255,138,107,.28), inset 0 0 0 1px rgba(255,255,255,.04); }
    50%     { box-shadow: 0 0 52px rgba(255,138,107,.55), inset 0 0 0 1px rgba(255,255,255,.08); }
  }
  .play svg { width: 24px; height: 24px; }

  /* Volume */
  .vol-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: rgba(255,255,255,.5);
  }
  .vol-row svg { width: 15px; height: 15px; }
  .vol {
    width: 110px;
    height: 1px;
    background: rgba(255,255,255,.18);
    position: relative;
  }
  .vol::after {
    content:"";
    position: absolute;
    left: 0; top: 0;
    height: 1px;
    width: 68%;
    background: var(--coral-soft);
  }
  .vol-dot {
    position: absolute;
    left: 68%; top: 50%;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--coral);
    transform: translate(-50%,-50%);
    box-shadow: 0 0 8px var(--coral);
  }

  /* Signal path */
  .signal {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,.5);
    text-transform: uppercase;
    padding-top: 4px;
  }
  .signal .node { white-space: nowrap; }
  .signal .label { color: rgba(255,255,255,.32); margin-right: 7px; }
  .signal .arrow { color: rgba(255,138,107,.6); }
  .seal {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 5px 13px 5px 9px;
    border-radius: 999px;
    border: 1px solid rgba(255,138,107,.45);
    color: var(--coral);
    background: rgba(255,138,107,.08);
    box-shadow: 0 0 18px rgba(255,138,107,.22), inset 0 0 12px rgba(255,138,107,.08);
    animation: sealPulse 3.2s ease-in-out infinite;
  }
  @keyframes sealPulse {
    0%,100% { box-shadow: 0 0 14px rgba(255,138,107,.18), inset 0 0 10px rgba(255,138,107,.06); }
    50%     { box-shadow: 0 0 26px rgba(255,138,107,.4), inset 0 0 16px rgba(255,138,107,.12); }
  }
  .seal .ring {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 1px solid var(--coral);
    display: grid; place-items: center;
  }
  .seal .ring svg { width: 9px; height: 9px; }
  .seal b { font-weight: 500; letter-spacing: 2px; }

  @media (max-width: 560px) {
    .signal { font-size: 9px; gap: 9px; }
    .reflection { display: none; }
  }
</style>
</head>
<body>
  <div class="stage playing" id="stage">
    <div class="art-mesh"></div>
    <div class="scrim"></div>
    <div class="grain"></div>

    <div class="content">
      <!-- Top -->
      <div class="topbar">
        <div class="wordmark">
          <div class="eko-bars"><span></span><span></span><span></span><span></span></div>
          <div class="eko-word">EKO</div>
        </div>
        <div class="now">Now Playing</div>
      </div>

      <!-- Center -->
      <div class="center">
        <div class="cover-wrap">
          <div class="cover"></div>
          <div class="reflection"></div>
        </div>
        <div class="meta">
          <div class="title">Emergency On Planet&nbsp;Earth <span style="opacity:.55;font-size:.62em;">(Remastered)</span></div>
          <div class="artist">Jamiroquai</div>
          <div class="format">FLAC · 44.1 kHz · 16-bit</div>
        </div>
      </div>

      <!-- Bottom -->
      <div class="bottom">
        <div class="spectrum" id="spectrum"></div>

        <div class="seek-row">
          <div class="time">2:14</div>
          <div class="seek" id="seek">
            <div class="seek-track"></div>
            <div class="seek-fill" id="fill"></div>
            <div class="seek-dot" id="dot"></div>
          </div>
          <div class="time right">−4:09</div>
        </div>

        <div class="controls">
          <button class="ctrl small" title="Shuffle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5M4 20 21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
          </button>
          <button class="ctrl" title="Previous">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5v14h2V5H6zm3 7 10 7V5L9 12z"/></svg>
          </button>
          <button class="play" id="playBtn" title="Play / Pause">
            <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
          </button>
          <button class="ctrl" title="Next">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 5v14h-2V5h2zM15 12 5 5v14l10-7z"/></svg>
          </button>
          <button class="ctrl small" title="Repeat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></svg>
          </button>
        </div>

        <div class="vol-row">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4z"/></svg>
          <div class="vol"><div class="vol-dot"></div></div>
        </div>

        <div class="signal">
          <span class="node"><span class="label">Source</span>FLAC · 44.1 kHz · 16-bit</span>
          <span class="arrow">→</span>
          <span class="node"><span class="label">Output</span>Chord Mojo 2</span>
          <span class="arrow">→</span>
          <span class="seal">
            <span class="ring"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l4 4 10-10"/></svg></span>
            <b>BIT-PERFECT</b>
          </span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Spectrum
    const spectrum = document.getElementById('spectrum');
    const BARS = 28;
    const bars = [];
    for (let i = 0; i < BARS; i++) {
      const el = document.createElement('i');
      spectrum.appendChild(el);
      bars.push(el);
    }
    // smooth per-bar oscillators give an organic, breathing analyser
    const phase = bars.map(() => Math.random() * Math.PI * 2);
    const speed = bars.map(() => 0.6 + Math.random() * 1.1);
    let playing = true, t = 0;

    function animate() {
      t += 0.045;
      for (let i = 0; i < BARS; i++) {
        const center = 1 - Math.abs(i - BARS / 2) / (BARS / 2); // taller in the middle
        let v;
        if (playing) {
          v = (Math.sin(t * speed[i] + phase[i]) * 0.5 + 0.5);
          v = (0.15 + v * 0.85) * (0.45 + center * 0.55);
        } else {
          v = 0.06 + center * 0.04;
        }
        bars[i].style.height = (v * 100) + '%';
      }
      requestAnimationFrame(animate);
    }
    animate();

    // Play / pause
    const stage = document.getElementById('stage');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    playBtn.addEventListener('click', () => {
      playing = !playing;
      stage.classList.toggle('playing', playing);
      playIcon.innerHTML = playing
        ? '<rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/>'
        : '<path d="M7 4v16l13-8z"/>';
    });

    // Seek scrub (visual only)
    const seek = document.getElementById('seek');
    const fill = document.getElementById('fill');
    const dot = document.getElementById('dot');
    seek.addEventListener('click', (e) => {
      const r = seek.getBoundingClientRect();
      const p = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
      fill.style.width = (p * 100) + '%';
      dot.style.left = (p * 100) + '%';
    });
  </script>
</body>
</html>
