<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<title>EKO — control lab</title>
<style>
  :root{
    --face:#f3f1ec; --chamf:#eae6de; --sh:62,58,50;
    --ink-2:#6d6a61; --label:#a4a096;
    --violet:#6a5cf0; --violet-2:#8d7dff; --violet-rgb:106,92,240; --gauge:#26252b;
    --mono:"SF Mono",ui-monospace,Menlo,monospace;
    --font:"Helvetica Neue","Inter",-apple-system,Helvetica,Arial,sans-serif;
    --in: inset 2px 2px 5px rgba(var(--sh),.16), inset -2px -2px 5px rgba(255,255,255,.92);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{ font-family:var(--font); background:#e4e0d8; min-height:100vh; display:grid; place-items:center; }
  .panel{ background:var(--face); border-radius:28px; padding:60px 70px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.9), 0 40px 80px -30px rgba(var(--sh),.5);
    display:flex; gap:64px; align-items:center; }
  .col{ display:flex; flex-direction:column; align-items:center; gap:22px; }
  .lab{ font:11px/1 var(--mono); letter-spacing:2px; color:var(--label); text-transform:uppercase; }

  /* ============ KNOB v4 — FLAT top, thin bevel, scales via % insets ============ */
  .knob{ position:relative; width:200px; height:200px; }
  .knob::before{ content:""; position:absolute; inset:0; border-radius:50%;
    box-shadow: inset 0 2px 4px rgba(var(--sh),.10), inset 0 -1px 2px rgba(255,255,255,.6); }
  .arc{ position:absolute; inset:0; width:100%; height:100%; transform:rotate(135deg); overflow:visible; }
  .arc .trk{ fill:none; stroke:var(--gauge); stroke-width:5; stroke-linecap:round; stroke-dasharray:75 100; }
  .arc .val{ fill:none; stroke:var(--violet); stroke-width:5; stroke-linecap:round; stroke-dasharray:46 100;
    filter:drop-shadow(0 0 2px rgba(var(--violet-rgb),.5)); }
  /* body = the BEVEL ring (bright directional light) + strong seat. thin ring => big flat top */
  .knob .body{ position:absolute; inset:8%; border-radius:50%;
    background: linear-gradient(155deg, #ffffff 0%, #f3efe8 44%, #d4cfc4 100%);
    box-shadow:
      0 3px 4px rgba(var(--sh),.30),
      0 26px 40px -12px rgba(var(--sh),.36),
      0 12px 20px -8px rgba(var(--sh),.24),
      inset 0 1.5px 1.5px rgba(255,255,255,.95),
      inset 0 -3px 4px rgba(150,144,132,.18); }
  /* the FLAT top: near-uniform white, crisp rim, edge defined by chamfer drop (not shading) */
  .knob .top{ position:absolute; inset:16%; border-radius:50%;
    background: radial-gradient(135% 135% at 50% 38%, #ffffff 0%, #faf8f3 70%, #f5f2eb 100%);
    box-shadow:
      inset 0 1.5px 1px rgba(255,255,255,.95),
      inset 0 -1px 1px rgba(150,144,132,.05),
      0 0 0 1px rgba(255,255,255,.6),
      0 4px 8px rgba(var(--sh),.26); }
  /* faint concentric groove on the flat face (the #7 detail) */
  .knob .top::after{ content:""; position:absolute; inset:20%; border-radius:50%;
    box-shadow: inset 0 1px 1px rgba(255,255,255,.65), 0 0 0 1px rgba(var(--sh),.045); }
  .knob .dial{ position:absolute; inset:16%; border-radius:50%; transform:rotate(40deg); }
  .knob .ind{ position:absolute; top:9%; left:50%; width:8px; height:8px; margin-left:-4px; border-radius:50%;
    background:#807c72; box-shadow: inset 0 1px 1px rgba(0,0,0,.4), 0 1px 0 rgba(255,255,255,.55); }

  /* ============ PLAY BUTTON ============ */
  .pbtn{ position:relative; width:120px; height:120px; border:0; border-radius:50%; cursor:pointer;
    background: linear-gradient(158deg, #fffefb 0%, #f0ece5 46%, #d7d2c8 100%);
    box-shadow:
      0 3px 4px rgba(var(--sh),.30),
      0 24px 40px -12px rgba(var(--sh),.36),
      0 10px 18px -8px rgba(var(--sh),.24),
      0 0 32px -4px rgba(var(--violet-rgb),.42),
      inset 0 1px 1px rgba(255,255,255,.9); }
  .pbtn .top{ position:absolute; inset:7%; border-radius:50%; display:grid; place-items:center; color:#3b3933;
    background: radial-gradient(135% 135% at 50% 40%, #fefdfb 0%, #f8f6f1 72%, #f4f1ea 100%);
    box-shadow: inset 0 1.5px 1px rgba(255,255,255,.9), inset 0 -1px 1px rgba(150,144,132,.05), 0 0 0 1px rgba(255,255,255,.55), 0 4px 7px rgba(var(--sh),.24); }
  .pbtn .top svg{ width:44px; height:44px; }

  /* ============ TOGGLE ============ */
  .slide{ position:relative; width:96px; height:50px; border-radius:26px; overflow:hidden; background:var(--face); box-shadow:var(--in); }
  .slide .vfill{ position:absolute; inset:5px; border-radius:21px; background:linear-gradient(180deg,var(--violet-2),var(--violet));
    box-shadow: inset 0 1px 3px rgba(255,255,255,.35), 0 0 14px rgba(var(--violet-rgb),.5); }
  .slide .nub{ position:absolute; top:5px; left:51px; width:40px; height:40px; border-radius:50%; z-index:2;
    background: radial-gradient(135% 135% at 50% 40%, #fefdfb 0%, #f7f4ef 72%, #efebe3 100%);
    box-shadow: 0 4px 8px rgba(var(--sh),.34), inset 0 1.5px 1px rgba(255,255,255,.9), inset 0 -1px 1px rgba(150,144,132,.06), 0 0 0 1px rgba(255,255,255,.5); }
</style></head>
<body>
  <div class="panel">
    <div class="col">
      <div class="knob"><svg class="arc" viewBox="0 0 100 100"><circle class="trk" cx="50" cy="50" r="45" pathLength="100"/><circle class="val" cx="50" cy="50" r="45" pathLength="100"/></svg><div class="body"></div><div class="top"></div><div class="dial"><i class="ind"></i></div></div>
      <div class="lab">Knob v3</div>
    </div>
    <div class="col">
      <button class="pbtn"><span class="top"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg></span></button>
      <div class="lab">Play</div>
    </div>
    <div class="col">
      <div class="slide"><span class="vfill"></span><span class="nub"></span></div>
      <div class="lab">Toggle</div>
    </div>
  </div>
</body></html>
