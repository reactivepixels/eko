<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EKO — Editorial / Swiss</title>
    <style>
      :root {
        --font: "Helvetica Neue", Inter, -apple-system, Helvetica, Arial, sans-serif;
        --mono: "SF Mono", ui-monospace, Menlo, monospace;
        --paper: #f3efe6;        /* warm white */
        --ink: #111110;          /* near black */
        --ink-2: #56544d;
        --line: #11111022;
        --line-2: #1111100f;
        --accent: #e8341c;       /* decisive vermilion */
        --seal-ink: #111110;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0; font-family: var(--font); color: var(--ink); background: var(--paper);
        -webkit-font-smoothing: antialiased; min-height: 100vh;
        display: grid; place-items: center; padding: 40px 20px;
      }
      .sheet {
        width: min(980px, 100%); background: var(--paper); position: relative;
        border: 1.5px solid var(--ink); padding: 0;
        box-shadow: 14px 14px 0 rgba(17,17,16,0.92);
      }

      /* masthead */
      .masthead { display: flex; align-items: stretch; justify-content: space-between; border-bottom: 1.5px solid var(--ink); }
      .wordmark { display: flex; align-items: center; gap: 12px; padding: 16px 24px; border-right: 1.5px solid var(--ink); }
      .bars { display: flex; align-items: flex-end; gap: 3px; height: 24px; }
      .bars i { width: 5px; background: var(--ink); }
      .bars i:nth-child(1){height:38%} .bars i:nth-child(2){height:72%}
      .bars i:nth-child(3){height:100%; background: var(--accent);} .bars i:nth-child(4){height:56%}
      .wm-text { font-weight: 800; letter-spacing: 0.3em; font-size: 20px; }
      .issue { display:flex; align-items:center; padding: 0 24px; font:600 11px/1.4 var(--mono); letter-spacing:0.14em; color:var(--ink-2); text-align:right; }
      .issue b { color: var(--ink); }

      /* hero band */
      .hero { display: grid; grid-template-columns: 1fr 250px; border-bottom: 1.5px solid var(--ink); }
      .hero-text { padding: 30px 24px 26px; border-right: 1.5px solid var(--ink); position: relative; }
      .kicker { display:flex; align-items:center; gap:10px; font:700 11px/1 var(--mono); letter-spacing:0.2em; color:var(--accent); margin-bottom: 18px; }
      .kicker::before { content:""; width:22px; height:2px; background: var(--accent); }
      .title { font-weight: 800; font-size: clamp(40px, 7vw, 76px); line-height: 0.92; letter-spacing: -0.035em; margin: 0; text-transform: uppercase; }
      .title .rem { display:block; font-weight: 400; font-size: 0.36em; letter-spacing: 0.02em; color: var(--ink-2); text-transform: none; margin-top: 14px; }
      .byline { margin-top: 22px; display:flex; align-items:baseline; gap:14px; }
      .byline .by { font:600 11px/1 var(--mono); letter-spacing:0.18em; color:var(--ink-2); }
      .byline .artist { font-weight: 700; font-size: 26px; letter-spacing: -0.01em; }

      /* cover plate */
      .cover { position: relative; overflow: hidden; }
      .cover .art { position:absolute; inset:0;
        background:
          conic-gradient(from 210deg at 30% 30%, var(--accent), #111110 30%, var(--accent) 55%, #111110 80%, var(--accent));
        }
      .cover .grid-lines { position:absolute; inset:0; background:
        repeating-linear-gradient(90deg, rgba(243,239,230,0.18) 0 1px, transparent 1px 26px),
        repeating-linear-gradient(0deg, rgba(243,239,230,0.18) 0 1px, transparent 1px 26px); }
      .cover .circle { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:118px; height:118px; border-radius:50%; border:6px solid var(--paper); }
      .cover .tag { position:absolute; left:10px; bottom:10px; font:700 10px/1 var(--mono); letter-spacing:0.14em; color: var(--paper); background: rgba(17,17,16,0.6); padding:5px 7px; }

      /* spec row: format badge + signal path */
      .specrow { display:grid; grid-template-columns: auto 1fr; border-bottom:1.5px solid var(--ink); }
      .badge { display:flex; align-items:center; padding:14px 22px; border-right:1.5px solid var(--ink);
        font:700 13px/1 var(--mono); letter-spacing:0.06em; }
      .badge .dot { width:9px;height:9px;border-radius:50%;background:var(--accent);margin-right:10px; }
      .signal { display:flex; align-items:center; gap:0; padding: 0 22px; }
      .node { padding:13px 0; }
      .node .k { display:block; font:700 9px/1 var(--mono); letter-spacing:0.2em; color:var(--ink-2); margin-bottom:4px; }
      .node .v { font-weight:700; font-size:13px; }
      .flow { flex:1; height:1.5px; background: var(--ink); margin:0 18px; position:relative; }
      .flow .pip { position:absolute; top:-3.5px; width:8px;height:8px; background:var(--accent); border-radius:50%; animation: run 1.8s linear infinite; }
      @keyframes run { from{left:0} to{left:100%} }
      .seal { margin-left:auto; display:inline-flex; align-items:center; gap:9px;
        font:800 12px/1 var(--mono); letter-spacing:0.1em; color:var(--paper);
        background: var(--ink); padding:9px 13px; }
      .seal svg { width:14px;height:14px; }

      /* spectrum strip */
      .specband { display:flex; align-items:flex-end; gap:3px; height:64px; padding: 16px 22px; border-bottom:1.5px solid var(--ink); }
      .specband i { flex:1; background: var(--ink); transform-origin:bottom; animation: eq 1s ease-in-out infinite; }
      .specband i.hot { background: var(--accent); }
      @keyframes eq { 0%,100%{transform:scaleY(0.12)} 50%{transform:scaleY(1)} }

      /* controls */
      .controls { display:grid; grid-template-columns: 1fr auto; }
      .seek-wrap { padding: 20px 22px; border-right:1.5px solid var(--ink); }
      .times { display:flex; justify-content:space-between; font:700 11px/1 var(--mono); letter-spacing:0.1em; color:var(--ink-2); margin-bottom:12px; }
      .seek { height:6px; background: var(--line); position:relative; }
      .seek .fill { position:absolute; inset:0 62% 0 0; background: var(--accent); }
      .seek .knob { position:absolute; left:38%; top:50%; transform:translate(-50%,-50%); width:14px;height:14px;background:var(--ink);border:2px solid var(--paper); }
      .vol-wrap { padding: 20px 22px; display:flex; flex-direction:column; justify-content:center; min-width:180px; }
      .vol-lbl { font:700 9px/1 var(--mono); letter-spacing:0.2em; color:var(--ink-2); margin-bottom:11px; }
      .vol { height:6px; background:var(--line); position:relative; }
      .vol .fill { position:absolute; inset:0 30% 0 0; background:var(--ink); }
      .vol .knob { position:absolute; left:70%; top:50%; transform:translate(-50%,-50%); width:14px;height:14px;background:var(--accent); }

      .transport { display:flex; align-items:stretch; border-top:1.5px solid var(--ink); }
      .tbtn { flex:1; padding: 20px 0; display:grid; place-items:center; cursor:pointer; color:var(--ink);
        border-right:1.5px solid var(--ink); background:var(--paper); transition:0.12s; }
      .tbtn:last-child { border-right:0; }
      .tbtn:hover { background: var(--ink); color: var(--paper); }
      .tbtn svg { width:22px;height:22px; }
      .tbtn.play { flex: 2; background: var(--accent); color: var(--paper); }
      .tbtn.play:hover { background: var(--ink); }
      .tbtn.play svg { width:26px;height:26px; }

      .colophon { display:flex; justify-content:space-between; padding:11px 22px; border-top:1.5px solid var(--ink);
        font:600 9px/1 var(--mono); letter-spacing:0.18em; color:var(--ink-2); }

      @media (max-width: 680px) {
        .hero { grid-template-columns: 1fr; }
        .hero-text { border-right:0; border-bottom:1.5px solid var(--ink); }
        .cover { height: 200px; }
        .specrow { grid-template-columns: 1fr; }
        .badge { border-right:0; border-bottom:1.5px solid var(--ink); }
        .signal { flex-wrap:wrap; gap:10px; padding:14px 22px; }
        .controls { grid-template-columns: 1fr; }
        .seek-wrap { border-right:0; border-bottom:1.5px solid var(--ink); }
      }
    </style>
  </head>
  <body>
    <div class="sheet">
      <div class="masthead">
        <div class="wordmark">
          <div class="bars"><i></i><i></i><i></i><i></i></div>
          <div class="wm-text">EKO</div>
        </div>
        <div class="issue">NOW&nbsp;PLAYING&nbsp;/&nbsp;<b>VOL.&nbsp;01</b><br />LOSSLESS&nbsp;·&nbsp;EXCLUSIVE&nbsp;MODE</div>
      </div>

      <div class="hero">
        <div class="hero-text">
          <div class="kicker">TRACK 03 · FUNK</div>
          <h1 class="title">Emergency<br />On Planet<br />Earth
            <span class="rem">(Remastered)</span>
          </h1>
          <div class="byline">
            <span class="by">BY</span>
            <span class="artist">Jamiroquai</span>
          </div>
        </div>
        <div class="cover">
          <div class="art"></div>
          <div class="grid-lines"></div>
          <div class="circle"></div>
          <div class="tag">A/B · 1993</div>
        </div>
      </div>

      <div class="specrow">
        <div class="badge"><span class="dot"></span>FLAC · 44.1 kHz · 16-BIT</div>
        <div class="signal">
          <div class="node"><span class="k">SOURCE</span><span class="v">FLAC 16/44.1</span></div>
          <div class="flow"><span class="pip"></span></div>
          <div class="node"><span class="k">OUTPUT</span><span class="v">DAC · 44.1 kHz</span></div>
          <div class="seal">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l7 3v6c0 4.5-3 8-7 9-4-1-7-4.5-7-9V5z"/><path d="M9 12l2 2 4-4"/></svg>
            BIT-PERFECT
          </div>
        </div>
      </div>

      <div class="specband" id="spectrum"></div>

      <div class="controls">
        <div class="seek-wrap">
          <div class="times"><span>1:42</span><span>−2:49</span></div>
          <div class="seek"><div class="fill"></div><div class="knob"></div></div>
        </div>
        <div class="vol-wrap">
          <div class="vol-lbl">VOLUME · 70</div>
          <div class="vol"><div class="fill"></div><div class="knob"></div></div>
        </div>
      </div>

      <div class="transport">
        <div class="tbtn" title="Shuffle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M4 20L21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></svg></div>
        <div class="tbtn" title="Previous"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h2v14H6zM20 5L9 12l11 7z"/></svg></div>
        <div class="tbtn play" title="Play/Pause"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5h3v14H8zM14 5h3v14h-3z"/></svg></div>
        <div class="tbtn" title="Next"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 5h2v14h-2zM4 5l11 7L4 19z"/></svg></div>
        <div class="tbtn" title="Repeat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg></div>
      </div>

      <div class="colophon">
        <span>EKO&nbsp;AUDIO&nbsp;ENGINE</span>
        <span>SET&nbsp;IN&nbsp;HELVETICA</span>
        <span>©&nbsp;BIT-PERFECT</span>
      </div>
    </div>

    <script>
      const spec = document.getElementById("spectrum");
      for (let i = 0; i < 56; i++) {
        const b = document.createElement("i");
        if (i % 7 === 3) b.classList.add("hot");
        b.style.animationDelay = (-(Math.random() * 1)).toFixed(2) + "s";
        b.style.animationDuration = (0.6 + Math.random() * 0.8).toFixed(2) + "s";
        spec.appendChild(b);
      }
    </script>
  </body>
</html>
