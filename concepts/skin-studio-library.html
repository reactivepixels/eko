<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EKO — Studio · Full Player (Library + Shell)</title>
<style>
  /* ============================================================
     EKO — "STUDIO" · FULL PLAYER
     One integrated device, not stacked panels. A Browse ⇄ Now Playing
     mode switch lives in the header; a persistent transport DOCK sits
     at the foot so you can browse while it plays. Library is an album
     wall in the device's matte language (no bright graphics). Same
     warm tokens + flat-top controls as the device + design-system.
     ============================================================ */
  :root {
    --bg-1:#e4e0d8; --face:#f3f1ec; --face-lo:#e7e3da; --chamf:#eae6de;
    --sh:62, 58, 50; --ink:#3b3933; --ink-2:#6d6a61; --label:#a4a096;
    --ac:#ef6a1e; --ac-2:#ff8a42; --ac-rgb:239, 106, 30; --gauge:#26252b; --green:#58b257;
    --font:"Helvetica Neue","Inter",-apple-system,Helvetica,Arial,sans-serif;
    --mono:"SF Mono",ui-monospace,"Roboto Mono",Menlo,monospace;
    --ease:cubic-bezier(.34,.02,.2,1); --spring:cubic-bezier(.5,1.5,.45,1);
    --in:inset 2px 2px 5px rgba(var(--sh),.16), inset -2px -2px 5px rgba(255,255,255,.92);
    --in-deep:inset 3px 3px 7px rgba(var(--sh),.22), inset -3px -3px 6px rgba(255,255,255,.9);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; }
  body {
    font-family:var(--font); color:var(--ink); -webkit-font-smoothing:antialiased;
    display:grid; place-items:center; padding:30px 18px;
    background:
      radial-gradient(120% 90% at 50% -6%, #f1eee8 0%, transparent 55%),
      radial-gradient(120% 110% at 50% 112%, #d2cdc2 0%, transparent 55%),
      var(--bg-1);
  }

  .device {
    position:relative; width:min(940px, 96vw); height:min(660px, 92vh);
    display:flex; flex-direction:column; border-radius:24px; overflow:hidden; background:var(--face);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.9), inset 0 0 0 1px rgba(255,255,255,.5),
      0 48px 90px -34px rgba(var(--sh),.5), 0 16px 30px -20px rgba(var(--sh),.4);
    isolation:isolate;
  }
  .device::before { content:""; position:absolute; inset:0; z-index:0; pointer-events:none; opacity:.5; mix-blend-mode:soft-light;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='150' height='150'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); }

  /* ---- header ---- */
  .bevel { position:relative; z-index:3; padding:14px 24px; flex:0 0 auto;
    background:linear-gradient(180deg, #efece6 0%, #f4f2ed 100%);
    box-shadow:inset 0 -1px 0 rgba(255,255,255,.9), 0 1px 0 rgba(var(--sh),.10);
    display:flex; align-items:center; justify-content:space-between; gap:16px; }
  .bevel::after { content:""; position:absolute; left:0; right:0; bottom:-1px; height:1px;
    background:linear-gradient(90deg, transparent, rgba(var(--sh),.12) 14%, rgba(var(--sh),.12) 86%, transparent); }
  .brand { display:flex; align-items:flex-end; gap:10px; }
  .bars { display:flex; align-items:flex-end; gap:3px; height:17px; }
  .bars i { width:3px; border-radius:1px; transform-origin:bottom; background:#b9b5ab; }
  .bars i:nth-child(1){ height:7px; } .bars i:nth-child(2){ height:17px; }
  .bars i:nth-child(3){ height:11px; } .bars i:nth-child(4){ height:14px; }
  .bars i.live { background:var(--ac); }
  .playing .bars i { animation:bob 1.6s ease-in-out infinite; }
  .playing .bars i:nth-child(2){ animation-delay:.2s; } .playing .bars i:nth-child(3){ animation-delay:.4s; } .playing .bars i:nth-child(4){ animation-delay:.1s; }
  @keyframes bob { 0%,100%{ transform:scaleY(1);} 50%{ transform:scaleY(.52);} }
  .brand b { font-size:17px; letter-spacing:.30em; font-weight:600; color:#8c887e; text-shadow:0 1px 0 rgba(255,255,255,.85); }
  .brand .sub { font:9px/1 var(--mono); letter-spacing:.18em; color:var(--label); align-self:center; }

  /* segmented mode switch */
  .seg { display:flex; padding:3px; border-radius:999px; background:var(--face); box-shadow:var(--in); }
  .seg button { border:0; cursor:pointer; background:transparent; padding:8px 16px; border-radius:999px;
    font:9px/1 var(--mono); letter-spacing:1.4px; text-transform:uppercase; color:var(--ink-2);
    transition:color .2s, box-shadow .2s, background .2s; }
  .seg button.on { color:var(--ink);
    background:linear-gradient(180deg,#fdfcf9,#f0ece5);
    box-shadow:0 2px 5px -1px rgba(var(--sh),.28), inset 0 1px 1px rgba(255,255,255,.9), 0 0 0 1px rgba(255,255,255,.5); }
  .seg button.on .dt { background:var(--ac); }
  .seg .dt { display:inline-block; width:5px; height:5px; border-radius:50%; background:#cdc8be; margin-right:6px; vertical-align:middle; }

  .apick { display:flex; align-items:center; gap:7px; }
  .apick .alab { font:8px/1 var(--mono); letter-spacing:2px; color:var(--label); text-transform:uppercase; margin-right:2px; }
  .sw { width:15px; height:15px; border-radius:50%; border:0; cursor:pointer; padding:0; background:var(--c);
    box-shadow:inset 0 1px 1px rgba(255,255,255,.45), 0 1px 2px rgba(var(--sh),.25), 0 0 0 1px rgba(0,0,0,.06); transition:transform .12s var(--ease); }
  .sw:hover { transform:scale(1.14); } .sw:active { transform:scale(.9); }
  .sw.on { box-shadow:0 0 0 2px var(--face), 0 0 0 3.5px var(--c), inset 0 1px 1px rgba(255,255,255,.4); }

  /* ---- stage (scrolls) ---- */
  .stage-wrap { position:relative; z-index:2; flex:1 1 auto; overflow:hidden; }
  .view { height:100%; overflow:auto; padding:18px 24px 22px; }
  .view::-webkit-scrollbar { width:9px; } .view::-webkit-scrollbar-thumb { background:rgba(var(--sh),.16); border-radius:9px; border:3px solid var(--face); }
  .view[hidden] { display:none; }

  /* sub-header: search · tabs · source */
  .subhead { display:flex; align-items:center; gap:14px; margin-bottom:18px; flex-wrap:wrap; }
  .search { flex:1; min-width:180px; display:flex; align-items:center; gap:9px; padding:10px 14px; border-radius:999px;
    background:var(--face); box-shadow:var(--in-deep); font:11px/1 var(--mono); letter-spacing:.4px; color:var(--label); }
  .search svg { width:13px; height:13px; opacity:.6; }
  .tabs { display:flex; gap:6px; }
  .pill { font:8.5px/1 var(--mono); letter-spacing:1px; text-transform:uppercase; color:var(--ink-2);
    padding:8px 11px; border-radius:999px; cursor:pointer; border:0; background:var(--face);
    box-shadow:0 2px 4px -1px rgba(var(--sh),.2), inset 0 1px 1px rgba(255,255,255,.85), 0 0 0 1px rgba(255,255,255,.4);
    transition:transform .08s var(--ease), color .2s, box-shadow .2s; }
  .pill:hover { color:var(--ink); } .pill:active { transform:translateY(1px) scale(.97); }
  .pill.on { color:var(--ac); box-shadow:var(--in); }
  .source { display:flex; padding:3px; border-radius:999px; background:var(--face); box-shadow:var(--in); }
  .source button { border:0; cursor:pointer; background:transparent; padding:7px 12px; border-radius:999px;
    font:8px/1 var(--mono); letter-spacing:1.2px; text-transform:uppercase; color:var(--ink-2); transition:.2s; }
  .source button.on { color:var(--ink); background:linear-gradient(180deg,#fdfcf9,#f0ece5);
    box-shadow:0 2px 4px -1px rgba(var(--sh),.24), inset 0 1px 1px rgba(255,255,255,.9), 0 0 0 1px rgba(255,255,255,.5); }

  /* ---- album wall ---- */
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(132px, 1fr)); gap:20px 18px; }
  .album { cursor:pointer; }
  /* single rounded box: image/gradient is the cover's own background, matte frame via inset shadow
     (no nested child radius, so corners never expose a solid colour) */
  .cover { position:relative; aspect-ratio:1; border-radius:12px; overflow:hidden;
    background-position:center; background-size:cover; background-repeat:no-repeat;
    box-shadow:inset 0 0 0 4px var(--face), inset 0 0 0 5px rgba(var(--sh),.12), 0 2px 4px rgba(var(--sh),.18), 0 12px 22px -10px rgba(var(--sh),.34);
    transition:transform .18s var(--ease), box-shadow .18s var(--ease); }
  .cover::after { content:""; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(120% 90% at 30% 16%, rgba(255,255,255,.18), transparent 55%); mix-blend-mode:soft-light; }
  .cover .cat { position:absolute; left:12px; bottom:10px; z-index:2; font:7.5px/1 var(--mono); letter-spacing:1px; color:rgba(255,255,255,.55); text-shadow:0 1px 2px rgba(0,0,0,.4); }
  .album:hover .cover { transform:translateY(-4px); box-shadow:inset 0 0 0 4px var(--face), inset 0 0 0 5px rgba(var(--sh),.12), 0 4px 6px rgba(var(--sh),.2), 0 20px 32px -12px rgba(var(--sh),.42); }
  .album:active .cover { transform:translateY(-1px) scale(.99); }
  .album.playing .cover { box-shadow:inset 0 0 0 4px var(--face), inset 0 0 0 5px rgba(var(--ac-rgb),.42), 0 2px 4px rgba(var(--sh),.18), 0 14px 26px -12px rgba(var(--sh),.34); }
  .nowtag { position:absolute; top:9px; right:9px; z-index:2; display:none; align-items:flex-end; gap:2px;
    padding:5px 6px; border-radius:7px; background:rgba(40,38,34,.42); backdrop-filter:blur(3px); }  /* sizes to its bars */
  .album.playing .nowtag { display:flex; }
  .nowtag i { width:2.5px; border-radius:1px; background:var(--ac); animation:bob 1.2s ease-in-out infinite; }
  .nowtag i:nth-child(1){ height:5px; } .nowtag i:nth-child(2){ height:11px; animation-delay:.2s; } .nowtag i:nth-child(3){ height:7px; animation-delay:.4s; }
  .meta-a { padding:11px 3px 0; }
  .meta-a .at { font-size:13px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .meta-a .aa { margin-top:3px; font-size:11px; color:var(--ink-2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  /* now-playing title stays ink — accent kept restrained (soft ring + small badge only) */

  /* muted, label-style gradient covers (no bright graphics) */
  /* album covers: image or muted label-style gradient, set inline in JS (single rounded box) */

  /* ============ NOW PLAYING view ============ */
  .np { display:flex; flex-direction:column; gap:18px; max-width:760px; margin:0 auto; }
  .np-top { display:grid; grid-template-columns:150px 1fr; gap:24px; align-items:center; }
  .np-cover { width:150px; height:150px; border-radius:14px; overflow:hidden;
    background:url("../site/assets/cover-light.webp") center/cover no-repeat, var(--face);
    box-shadow:inset 0 0 0 5px var(--face), inset 0 0 0 6px rgba(var(--sh),.14), 0 3px 6px rgba(var(--sh),.2), 0 16px 30px -12px rgba(var(--sh),.36); }
  .np-meta .t { font-size:28px; font-weight:600; letter-spacing:-.01em; color:var(--ink); line-height:1.08; }
  .np-meta .a { margin-top:7px; font-size:15px; color:var(--ink-2); }
  .fbadge { margin-top:14px; display:inline-flex; align-items:center; gap:8px; padding:6px 11px; border-radius:999px;
    font:9px/1 var(--mono); letter-spacing:1.6px; color:var(--ink-2); text-transform:uppercase; background:var(--face); box-shadow:var(--in); }
  .fbadge .ld { width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 5px rgba(88,178,87,.55); }
  .rule { height:1px; background:linear-gradient(90deg, transparent, rgba(var(--sh),.10) 8%, rgba(var(--sh),.10) 92%, transparent); }
  .np-eq { display:flex; align-items:flex-start; justify-content:space-between; gap:26px; }
  .eqwrap { display:flex; flex-direction:column; gap:16px; }
  .eqhead { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .eqtitle { font:9px/1 var(--mono); letter-spacing:2px; color:var(--label); text-transform:uppercase; }
  .eqpresets { display:flex; gap:6px; }
  .eq { display:flex; gap:18px; }
  .ctl { display:flex; flex-direction:column; align-items:center; gap:11px; }
  .klabel { font:10px/1.3 var(--mono); letter-spacing:1px; color:var(--label); text-transform:uppercase; text-align:center; text-shadow:0 1px 0 rgba(255,255,255,.7); }
  .cluster { display:flex; flex-direction:column; gap:16px; align-items:center; }
  .switches { display:flex; gap:18px; }
  .meterbox { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .sig { display:flex; align-items:center; justify-content:center; gap:12px; font:9px/1 var(--mono); letter-spacing:1.5px; color:var(--label); text-transform:uppercase; flex-wrap:wrap; }
  .sig .lab { color:#b6b2a8; margin-right:5px; } .sig .arrow { color:#c7c2b7; }
  .sig .lock { color:var(--ink-2); } .sig .lock .d { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--ac); box-shadow:0 0 6px rgba(var(--ac-rgb),.6); margin-right:5px; vertical-align:middle; }

  /* ---- shared controls ---- */
  .knob { position:relative; width:70px; aspect-ratio:1/1; flex:0 0 auto; cursor:grab; touch-action:none; }
  .knob.dock { width:62px; }
  .knob.dock .ind { width:7px; height:7px; margin-left:-3.5px; }
  .knob.dock::before { box-shadow:inset 0 -1px 1px rgba(255,255,255,.5); }  /* drop the dark inset top */
  .knob.dock .top::after { display:none; }                                 /* drop the concentric outline ring */
  .knob.dragging { cursor:grabbing; }
  .knob::before { content:""; position:absolute; inset:0; border-radius:50%; box-shadow:inset 0 1px 2px rgba(var(--sh),.10), inset 0 -1px 1px rgba(255,255,255,.6); transition:box-shadow .18s var(--ease); }
  .knob.dragging::before { box-shadow:inset 0 1px 2px rgba(var(--sh),.10), inset 0 -1px 1px rgba(255,255,255,.6), 0 0 0 2px rgba(var(--ac-rgb),.22); }
  .arc { position:absolute; inset:0; width:100%; height:100%; transform:rotate(135deg); overflow:visible; }
  .arc .trk { fill:none; stroke:var(--gauge); stroke-width:5; stroke-linecap:round; stroke-dasharray:75 100; }
  .arc .val { fill:none; stroke:var(--ac); stroke-width:5; stroke-linecap:round; stroke-dasharray:0 100; filter:drop-shadow(0 0 2px rgba(var(--ac-rgb),.5)); transition:stroke-dasharray .45s var(--ease); }
  .knob.dragging .arc .val { transition:none; }
  .knob .body { position:absolute; inset:8%; border-radius:50%;
    background:linear-gradient(155deg, #ffffff 0%, #f3efe8 44%, #d4cfc4 100%);
    box-shadow:0 3px 4px rgba(var(--sh),.30), 0 16px 26px -8px rgba(var(--sh),.34), 0 7px 13px -5px rgba(var(--sh),.24), inset 0 1.5px 1.5px rgba(255,255,255,.95), inset 0 -3px 4px rgba(150,144,132,.18); }
  .knob .top { position:absolute; inset:16%; border-radius:50%;
    background:radial-gradient(135% 135% at 50% 38%, #ffffff 0%, #faf8f3 70%, #f5f2eb 100%);
    box-shadow:inset 0 1.5px 1px rgba(255,255,255,.95), inset 0 -1px 1px rgba(150,144,132,.05), 0 0 0 1px rgba(255,255,255,.6), 0 4px 8px rgba(var(--sh),.26); }
  .knob .top::after { content:""; position:absolute; inset:20%; border-radius:50%; box-shadow:inset 0 1px 1px rgba(255,255,255,.65), 0 0 0 1px rgba(var(--sh),.045); }
  .knob .dial { position:absolute; inset:16%; border-radius:50%; transform:rotate(-90deg); transition:transform .45s var(--ease); }
  .knob.dragging .dial { transition:none; }
  .knob .ind { position:absolute; top:9%; left:50%; width:6px; height:6px; margin-left:-3px; border-radius:50%; background:#807c72; box-shadow:inset 0 1px 1px rgba(0,0,0,.4), 0 1px 0 rgba(255,255,255,.55); }

  .slide { position:relative; width:48px; height:25px; border-radius:14px; cursor:pointer; overflow:hidden; background:var(--face); box-shadow:var(--in); }
  .slide .vfill { position:absolute; inset:3px; border-radius:11px; opacity:0; transition:opacity .22s; background:linear-gradient(180deg, var(--ac-2), var(--ac)); box-shadow:inset 0 1px 2px rgba(255,255,255,.35), 0 0 10px rgba(var(--ac-rgb),.45); }
  .slide.on .vfill { opacity:1; }
  .slide .nub { position:absolute; top:3px; left:3px; width:19px; height:19px; border-radius:50%; z-index:2;
    background:radial-gradient(135% 135% at 50% 40%, #fefdfb 0%, #f7f4ef 72%, #efebe3 100%);
    box-shadow:0 3px 6px rgba(var(--sh),.34), inset 0 1.5px 1px rgba(255,255,255,.9), 0 0 0 1px rgba(255,255,255,.5); transition:left .26s var(--spring), transform .1s var(--ease); }
  .slide.on .nub { left:26px; } .slide:active .nub { transform:scale(.92); }

  .meter { display:flex; align-items:center; gap:4px; padding:8px 11px; border-radius:12px; background:var(--face); box-shadow:var(--in); }
  .meter i { width:5px; height:14px; border-radius:2px; background:#ddd9d0; box-shadow:inset 0 1px 1px rgba(var(--sh),.18); transition:background .08s, box-shadow .08s; }
  .meter i.on { background:var(--green); box-shadow:0 0 5px rgba(88,178,87,.5); }
  .meter i.pk.on { background:var(--ac); box-shadow:0 0 6px rgba(var(--ac-rgb),.6); }

  /* ============ DOCK (persistent transport) ============ */
  .dock { position:relative; z-index:3; flex:0 0 auto; display:grid; grid-template-columns:minmax(190px,1fr) auto minmax(170px,1fr); gap:20px; align-items:center;
    padding:15px 24px; background:linear-gradient(180deg, #f1eee8 0%, #e9e5dd 100%);
    box-shadow:0 -14px 28px -22px rgba(var(--sh),.38); }  /* soft lift only — no hard seam line */
  .dk-track { display:flex; align-items:center; gap:13px; min-width:0; }
  .dk-thumb { width:46px; height:46px; flex:0 0 auto; border-radius:9px; overflow:hidden;
    background:url("../site/assets/cover-light.webp") center/cover no-repeat, var(--face);
    box-shadow:inset 0 0 0 3px var(--face), inset 0 0 0 4px rgba(var(--sh),.14), 0 2px 5px rgba(var(--sh),.26); }
  .dk-tx { min-width:0; }
  .dk-tx .t { font-size:13px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .dk-tx .s { margin-top:2px; font:8.5px/1.2 var(--mono); letter-spacing:.6px; color:var(--ink-2); text-transform:uppercase; }
  .dk-mid { display:flex; align-items:center; gap:16px; }
  .transport { display:flex; align-items:center; gap:12px; }
  .pbtn { position:relative; width:44px; height:44px; border:0; border-radius:50%; cursor:pointer; padding:0;
    background:linear-gradient(158deg, #fffefb 0%, #f0ece5 46%, #d7d2c8 100%);
    box-shadow:0 3px 4px rgba(var(--sh),.28), 0 10px 18px -8px rgba(var(--sh),.3), inset 0 1px 1px rgba(255,255,255,.9);
    transition:transform .07s var(--ease), box-shadow .07s var(--ease); }
  .pbtn .top { position:absolute; inset:8%; border-radius:50%; display:grid; place-items:center; color:var(--ink-2);
    background:radial-gradient(135% 135% at 50% 40%, #fefdfb 0%, #f8f6f1 72%, #f4f1ea 100%);
    box-shadow:inset 0 1.5px 1px rgba(255,255,255,.9), 0 0 0 1px rgba(255,255,255,.55), 0 3px 6px rgba(var(--sh),.22); transition:.07s var(--ease); }
  .pbtn:active { transform:translateY(2px) scale(.985); box-shadow:0 1px 2px rgba(var(--sh),.26), inset 0 2px 5px rgba(150,144,132,.2), inset 0 1px 1px rgba(255,255,255,.55); }
  .pbtn:active .top { box-shadow:inset 0 2px 5px rgba(150,144,132,.3), 0 0 0 1px rgba(255,255,255,.4); }
  .pbtn .top svg { width:16px; height:16px; }
  .pbtn.play { width:52px; height:52px; box-shadow:0 3px 4px rgba(var(--sh),.28), 0 12px 20px -8px rgba(var(--sh),.32), 0 0 22px -3px rgba(var(--ac-rgb),.5), inset 0 1px 1px rgba(255,255,255,.85); }
  .pbtn.play .top { color:var(--ink); } .pbtn.play .top svg { width:21px; height:21px; }
  .seekwrap { display:flex; align-items:center; gap:11px; min-width:200px; }
  .tt { font:9px/1 var(--mono); letter-spacing:.5px; color:var(--ink-2); min-width:34px; }
  .tt.r { text-align:right; }
  .slot { position:relative; flex:1; height:14px; border-radius:999px; cursor:pointer; background:var(--face); box-shadow:var(--in-deep); }
  .slot .fill { position:absolute; top:50%; left:4px; transform:translateY(-50%); height:5px; width:36%; border-radius:999px; background:linear-gradient(90deg, rgba(var(--ac-rgb),.55), rgba(var(--ac-rgb),.85)); box-shadow:0 0 8px rgba(var(--ac-rgb),.4); }
  .slot .nub { position:absolute; top:50%; left:36%; width:20px; height:20px; border-radius:50%; transform:translate(-50%,-50%);
    background:radial-gradient(135% 135% at 50% 40%, #fefdfb 0%, #f7f4ef 72%, #efebe3 100%);
    box-shadow:0 3px 4px rgba(var(--sh),.3), inset 0 1.5px 1px rgba(255,255,255,.9), 0 0 0 1px rgba(255,255,255,.5); transition:transform .12s var(--ease); }
  .slot.dragging .nub { transform:translate(-50%,-50%) scale(1.16); box-shadow:0 3px 5px rgba(var(--sh),.32), 0 0 0 4px rgba(var(--ac-rgb),.16); }
  .dk-right { display:flex; align-items:center; justify-content:flex-end; gap:16px; }
  .dk-vol { display:flex; align-items:center; gap:10px; }
  .dk-vol .vlab { font:8px/1 var(--mono); letter-spacing:1.2px; color:var(--label); text-transform:uppercase; }
  .lamp { display:inline-flex; align-items:center; gap:8px; font:8.5px/1.3 var(--mono); letter-spacing:1.2px; text-transform:uppercase; color:var(--ink-2); }
  .lamp .d { width:8px; height:8px; border-radius:50%; background:var(--ac); box-shadow:0 0 7px rgba(var(--ac-rgb),.65); }

  @media (max-width:720px) {
    .device { height:auto; min-height:0; }
    .np-top { grid-template-columns:1fr; justify-items:center; text-align:center; }
    .np-eq { flex-direction:column; align-items:center; }
    .dock { grid-template-columns:1fr; gap:12px; } .dk-right { justify-content:flex-start; }
    .seg button { padding:8px 11px; } .apick .alab { display:none; }
  }
</style>
</head>
<body>
  <div class="device playing" id="device">
    <!-- header -->
    <div class="bevel">
      <div class="brand">
        <span class="bars"><i></i><i class="live"></i><i></i><i></i></span>
        <b>EKO</b><span class="sub">studio</span>
      </div>
      <div class="seg" id="seg">
        <button class="on" data-view="browse"><span class="dt"></span>Browse</button>
        <button data-view="play"><span class="dt"></span>Now Playing</button>
      </div>
      <div class="apick" id="apick">
        <span class="alab">Accent</span>
        <button class="sw on" data-ac="orange" style="--c:#ef6a1e"></button>
        <button class="sw" data-ac="violet" style="--c:#6a5cf0"></button>
        <button class="sw" data-ac="blue" style="--c:#2f8fff"></button>
        <button class="sw" data-ac="teal" style="--c:#13b5a6"></button>
        <button class="sw" data-ac="graphite" style="--c:#6f6c63"></button>
      </div>
    </div>

    <div class="stage-wrap">
      <!-- ===== BROWSE ===== -->
      <section class="view" id="browse">
        <div class="subhead">
          <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>Search your library…</div>
          <div class="tabs">
            <button class="pill on">Albums</button><button class="pill">Artists</button><button class="pill">Tracks</button><button class="pill">Playlists</button>
          </div>
          <div class="source" id="source">
            <button class="on">Local</button><button>Stream</button>
          </div>
        </div>
        <div class="grid" id="grid"></div>
      </section>

      <!-- ===== NOW PLAYING ===== -->
      <section class="view" id="play" hidden>
        <div class="np">
          <div class="np-top">
            <div class="np-cover"></div>
            <div class="np-meta">
              <div class="t">Resonance</div>
              <div class="a">EKO — Generated Ambient</div>
              <div class="fbadge"><span class="ld"></span>FLAC · 96 kHz · 24-bit</div>
            </div>
          </div>
          <div class="rule"></div>
          <div class="np-eq">
            <div class="eqwrap">
              <div class="eqhead">
                <span class="eqtitle">Equaliser</span>
                <div class="eqpresets" id="eqpresets">
                  <button class="pill" data-preset="Flat">Flat</button>
                  <button class="pill on" data-preset="Jazz">Jazz</button>
                  <button class="pill" data-preset="Rock">Rock</button>
                  <button class="pill" data-preset="Vocal">Vocal</button>
                </div>
              </div>
              <div class="eq" id="eq"></div>
            </div>
            <div class="cluster">
              <div class="switches">
                <div class="ctl"><div class="slide on" data-toggle><span class="vfill"></span><span class="nub"></span></div><div class="klabel">Gapless</div></div>
                <div class="ctl"><div class="slide" data-toggle><span class="vfill"></span><span class="nub"></span></div><div class="klabel">Repeat</div></div>
              </div>
              <div class="meterbox"><div class="meter" id="meter"></div><div class="klabel">Signal</div></div>
            </div>
          </div>
          <div class="rule"></div>
          <div class="sig">
            <span><span class="lab">Source</span>FLAC 96/24</span><span class="arrow">→</span>
            <span><span class="lab">Output</span>Naim DAC · 96 kHz</span><span class="arrow">→</span>
            <span class="lock"><span class="d"></span>Bit-Perfect · Locked</span>
          </div>
        </div>
      </section>
    </div>

    <!-- ===== DOCK (persistent transport) ===== -->
    <div class="dock">
      <div class="dk-track">
        <div class="dk-thumb" id="dkThumb"></div>
        <div class="dk-tx"><div class="t" id="dkTitle">Resonance</div><div class="s" id="dkSub">EKO · FLAC 96/24</div></div>
      </div>
      <div class="dk-mid">
        <div class="transport">
          <button class="pbtn" title="Previous"><span class="top"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5v14h2V5H6zm3 7 10 7V5L9 12z"/></svg></span></button>
          <button class="pbtn play" id="play" title="Play / Pause"><span class="top"><svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg></span></button>
          <button class="pbtn" title="Next"><span class="top"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 5v14h-2V5h2zM15 12 5 5v14l10-7z"/></svg></span></button>
        </div>
        <div class="seekwrap">
          <span class="tt">2:01</span>
          <div class="slot" id="slot"><div class="fill" id="fill"></div><div class="nub" id="nub"></div></div>
          <span class="tt r">−2:32</span>
        </div>
      </div>
      <div class="dk-right">
        <div class="dk-vol"><span class="vlab">Vol</span>
          <div class="knob dock" data-val="0.62" id="vol"><svg class="arc" viewBox="0 0 100 100"><circle class="trk" cx="50" cy="50" r="45" pathLength="100"/><circle class="val" cx="50" cy="50" r="45" pathLength="100"/></svg><div class="body"></div><div class="top"></div><div class="dial"><i class="ind"></i></div></div>
        </div>
        <span class="lamp"><span class="d"></span>Bit-Perfect</span>
      </div>
    </div>
  </div>

  <script>
    // ---- library data (real cover on the playing one, muted gradients elsewhere) ----
    const ALBUMS = [
      { t:'Resonance', a:'EKO', img:'../site/assets/cover-light.webp', cat:'EKO-001', playing:true },
      { t:'Glass Fields', a:'Aria Voss', g:'g2', cat:'BLU-204' },
      { t:'Slow Lit', a:'Hiro Tanaka', g:'g3', cat:'SAG-118' },
      { t:'Terracotta', a:'M. Delaney', g:'g4', cat:'CLY-077' },
      { t:'Nightform', a:'Vantablack', g:'g5', cat:'GRf-012' },
      { t:'Rose Static', a:'Lune', g:'g6', cat:'RSE-330' },
      { t:'Goldcut', a:'The Pressing', g:'g7', cat:'OCH-256' },
      { t:'Indigo Hours', a:'Sael', g:'g8', cat:'IND-441' },
      { t:'Driftwood', a:'Coastline', g:'g9', cat:'TID-090' },
      { t:'Warm Sand', a:'Dune Quartet', g:'g1', cat:'SND-015' },
      { t:'Paper Moon', a:'Olwen', g:'g10', cat:'PAP-202' },
      { t:'Quiet Engine', a:'Halefield', g:'g2', cat:'BLU-205' },
    ];
    const GRAD = {
      g1:'linear-gradient(150deg,#d9cdb8,#b3a184)', g2:'linear-gradient(150deg,#9aa3ab,#6b727b)',
      g3:'linear-gradient(150deg,#b6bfa8,#7f8d74)', g4:'linear-gradient(150deg,#cfa791,#a3735c)',
      g5:'linear-gradient(150deg,#807d76,#4d4b46)', g6:'linear-gradient(150deg,#c9adad,#98787d)',
      g7:'linear-gradient(150deg,#d9c489,#b09353)', g8:'linear-gradient(150deg,#9296ab,#595d72)',
      g9:'linear-gradient(150deg,#a9b4b6,#74807f)', g10:'linear-gradient(150deg,#c2b39c,#92806a)',
    };
    const coverBg = al => al.img ? `url('${al.img}')` : (GRAD[al.g] || 'var(--face-lo)');
    const grid = document.getElementById('grid');
    ALBUMS.forEach((al,i)=>{
      const el = document.createElement('div'); el.className = 'album'+(al.playing?' playing':''); el.dataset.i = i;
      el.innerHTML = `<div class="cover" style="background-image:${coverBg(al)}">
          <span class="cat">${al.cat}</span>
          <span class="nowtag"><i></i><i></i><i></i></span>
        </div>
        <div class="meta-a"><div class="at">${al.t}</div><div class="aa">${al.a}</div></div>`;
      el.addEventListener('click', ()=> selectAlbum(i, el));
      grid.appendChild(el);
    });
    function selectAlbum(i, el){
      document.querySelectorAll('.album').forEach(a=>a.classList.remove('playing'));
      el.classList.add('playing');
      const al = ALBUMS[i];
      document.getElementById('dkTitle').textContent = al.t;
      document.getElementById('dkSub').textContent = al.a.toUpperCase()+' · FLAC 96/24';
      document.getElementById('dkThumb').style.backgroundImage = coverBg(al);
      if (!playing) togglePlay();
    }

    // ---- mode switch ----
    document.querySelectorAll('#seg button').forEach(b=>{
      b.addEventListener('click', ()=>{
        document.querySelectorAll('#seg button').forEach(x=>x.classList.remove('on')); b.classList.add('on');
        const v = b.dataset.view;
        document.getElementById('browse').hidden = v!=='browse';
        document.getElementById('play').hidden = v!=='play';
      });
    });
    // tabs + source segmented
    document.querySelectorAll('.tabs .pill').forEach(p=> p.addEventListener('click', ()=>{
      document.querySelectorAll('.tabs .pill').forEach(x=>x.classList.remove('on')); p.classList.add('on'); }));
    document.querySelectorAll('#source button').forEach(s=> s.addEventListener('click', ()=>{
      document.querySelectorAll('#source button').forEach(x=>x.classList.remove('on')); s.classList.add('on'); }));

    // ---- EQ knobs ----
    const EQ_PRESETS = { Flat:[.5,.5,.5,.5,.5], Jazz:[.62,.54,.46,.55,.60], Rock:[.70,.56,.42,.58,.70], Vocal:[.44,.56,.66,.60,.50] };
    const BANDS = ['60','250','1k','4k','12k'];
    const eq = document.getElementById('eq'), init = EQ_PRESETS.Jazz;
    BANDS.forEach((lab,i)=>{ const c=document.createElement('div'); c.className='ctl';
      c.innerHTML = `<div class="knob" data-val="${init[i]}"><svg class="arc" viewBox="0 0 100 100"><circle class="trk" cx="50" cy="50" r="45" pathLength="100"/><circle class="val" cx="50" cy="50" r="45" pathLength="100"/></svg><div class="body"></div><div class="top"></div><div class="dial"><i class="ind"></i></div></div><div class="klabel">${lab}</div>`;
      eq.appendChild(c); });

    function bindKnob(knob){
      const val=knob.querySelector('.val'), dial=knob.querySelector('.dial'); let v=parseFloat(knob.dataset.val||'0.5');
      function render(){ val.style.strokeDasharray=(v*75).toFixed(2)+' 100'; dial.style.transform='rotate('+(v*270-135)+'deg)'; } render();
      let down=false, sy=0, sv=0;
      knob.addEventListener('pointerdown', e=>{ down=true; knob.classList.add('dragging'); sy=e.clientY; sv=v; knob.setPointerCapture(e.pointerId); e.preventDefault(); });
      knob.addEventListener('pointermove', e=>{ if(!down) return; v=Math.max(0,Math.min(1, sv+(sy-e.clientY)/165)); render(); });
      function up(){ if(!down) return; down=false; knob.classList.remove('dragging'); }
      knob.addEventListener('pointerup', up); knob.addEventListener('pointercancel', up);
      return nv=>{ v=Math.max(0,Math.min(1,nv)); render(); };
    }
    const eqSet = Array.from(document.querySelectorAll('.eq .knob')).map(bindKnob); bindKnob(document.getElementById('vol'));
    document.querySelectorAll('#eqpresets .pill').forEach(p=> p.addEventListener('click', ()=>{
      document.querySelectorAll('#eqpresets .pill').forEach(x=>x.classList.remove('on')); p.classList.add('on');
      (EQ_PRESETS[p.dataset.preset]||[]).forEach((v,i)=> eqSet[i] && eqSet[i](v)); }));

    // ---- toggles ----
    document.querySelectorAll('[data-toggle]').forEach(s=> s.addEventListener('click', ()=> s.classList.toggle('on')));

    // ---- accent ----
    const ACC = { orange:['#ef6a1e','#ff8a42','239, 106, 30'], violet:['#6a5cf0','#8d7dff','106, 92, 240'], blue:['#2f8fff','#5cabff','47, 143, 255'], teal:['#13b5a6','#3ed6c7','19, 181, 166'], graphite:['#6f6c63','#8a877d','111, 108, 99'] };
    function applyAccent(n){ const a=ACC[n]; if(!a) return; document.querySelectorAll('#apick .sw').forEach(x=>x.classList.toggle('on', x.dataset.ac===n));
      const r=document.documentElement.style; r.setProperty('--ac',a[0]); r.setProperty('--ac-2',a[1]); r.setProperty('--ac-rgb',a[2]); }
    document.querySelectorAll('#apick .sw').forEach(s=> s.addEventListener('click', ()=> applyAccent(s.dataset.ac)));
    const params = new URLSearchParams(location.search);
    const qac = params.get('ac'); if (qac) applyAccent(qac);
    const qv = params.get('view'); if (qv==='play'){ const b=document.querySelector('#seg button[data-view="play"]'); if(b) b.click(); }

    // ---- meter ----
    const meter=document.getElementById('meter'), M=12, mled=[];
    for(let i=0;i<M;i++){ const el=document.createElement('i'); if(i>=M-2) el.className='pk'; meter.appendChild(el); mled.push(el); }
    let playing=true, lvl=.6, tm=0;
    function meterTick(){ tm+=.04; const tgt= playing ? (.45+.4*(Math.sin(tm*1.7)*.5+.5)+.12*Math.sin(tm*5.3)) : .04; lvl+=(tgt-lvl)*.25;
      const lit=Math.round(Math.max(0,Math.min(1,lvl))*M); mled.forEach((el,i)=> el.classList.toggle('on', i<lit)); requestAnimationFrame(meterTick); } meterTick();

    // ---- play/pause ----
    const device=document.getElementById('device'), play=document.getElementById('play'), icon=document.getElementById('playIcon');
    function togglePlay(){ playing=!playing; device.classList.toggle('playing', playing);
      icon.innerHTML = playing ? '<rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/>' : '<path d="M7 4v16l13-8z"/>'; }
    play.addEventListener('click', togglePlay);

    // ---- seek ----
    const slot=document.getElementById('slot'), fill=document.getElementById('fill'), nub=document.getElementById('nub');
    function setSeek(p){ p=Math.max(0,Math.min(1,p)); fill.style.width='calc('+(p*100)+'% - 10px)'; nub.style.left=(p*100)+'%'; } setSeek(.44);
    let sdown=false; slot.addEventListener('pointerdown', e=>{ sdown=true; slot.classList.add('dragging'); slot.setPointerCapture(e.pointerId); s(e); });
    slot.addEventListener('pointermove', e=>{ if(sdown) s(e); });
    function sup(){ sdown=false; slot.classList.remove('dragging'); } slot.addEventListener('pointerup', sup); slot.addEventListener('pointercancel', sup);
    function s(e){ const r=slot.getBoundingClientRect(); setSeek((e.clientX-r.left)/r.width); }
  </script>
</body>
</html>
